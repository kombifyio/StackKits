          type: string
        status:
          type: string
          enum: [pass, warn, fail]
        target:
          type: string
        message:
          type: string
    ManagementStatus:
      type: object
      properties:
        status:
          type: string
        baseDir:
          type: string
        specPath:
          type: string
        specLoaded:
          type: boolean
        statePath:
          type: string
        stateLoaded:
          type: boolean
        stackkit:
          type: string
        mode:
          type: string
        domain:
          type: string
        deploymentStatus:
          type: string
        logDir:
          type: string
        latestRunId:
          type: string
        mutationPolicy:
          type: string
    DoctorResult:
      type: object
      properties:
        status:
          type: string
          enum: [pass, warn, fail]
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ManagementCheck"
    ManagementCheck:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [pass, warn, fail]
        target:
          type: string
        message:
          type: string
    ManagementPlan:
      type: object
