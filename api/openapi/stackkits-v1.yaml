openapi: "3.1.0"
info:
  title: kombify StackKits API
  version: "1.0.0"
  description: |
    kombify StackKits HTTP API — pre-packaged homelab infrastructure templates
    with CUE schema validation and OpenTofu generation. Designed for consumption
    by the kombify Stack control plane and AI agents via the kombify Gateway.
  contact:
    name: kombify
    url: https://kombify.io
  license:
    name: MIT
servers:
  - url: http://localhost:8082
    description: Local development
  - url: https://api.kombify.io/stackkits
    description: Production (via Cloudflare Edge)
paths:
  /health:
    get:
      operationId: healthRoot
      summary: Root health check
      tags: [Health]
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"
  /api/v1/health:
    get:
      operationId: health
      summary: Service health check
      tags: [Health]
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"
  /api/v1/capabilities:
    get:
      operationId: getCapabilities
      summary: List all API capabilities (AI agent discovery)
      tags: [Discovery]
      responses:
        "200":
          description: List of capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
  /api/v1/openapi.yaml:
    get:
      operationId: getOpenAPISpec
      summary: Get OpenAPI 3.1 specification
      tags: [Discovery]
      responses:
        "200":
          description: YAML OpenAPI spec
          content:
            application/yaml:
              schema:
                type: string
  /api/v2/resolve:
    post:
      operationId: resolveArchitectureV2
      summary: Resolve canonical Architecture v2 intent
      description: |
        Resolves a canonical StackSpec v2 and optional observed inventory through
        the embedded governed CUE authority. The successful response is the raw,
        canonical ResolvedPlan document; it is not wrapped in a success envelope.
        StackSpec v1 input is never compiled implicitly and instead returns a
        machine-readable migration report. Production deployments require the
        X-API-Key security scheme; explicitly unauthenticated local-development
        deployments may use the anonymous alternative. Requests are bounded to
        64 JSON nesting levels, 65,536 JSON tokens, and 4,096 entries per
        individual object or array before governed CUE resolution begins.
      tags: [Architecture]
      security:
        - StackKitsAPIKey: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchitectureV2ResolveRequest"
      responses:
        "200":
          description: Canonical ResolvedPlan bytes
          headers:
            Cache-Control:
              description: Resolved deployment plans must not be cached.
              schema:
                type: string
                const: no-store
            ETag:
              description: Strong ETag containing the quoted ResolvedPlan planHash.
              schema:
                type: string
                pattern: '^"sha256:[a-f0-9]{64}"$'
            X-StackKit-Plan-Hash:
              description: Unquoted ResolvedPlan planHash.
              schema:
                $ref: "#/components/schemas/ArchitectureV2ContentHash"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolvedPlan"
        "400":
          description: Invalid JSON envelope, StackSpec, or inventory
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "401":
          description: Missing API key when authentication is enabled
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid API key when authentication is enabled
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Resolve request exceeds the one-mebibyte body limit
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "415":
          description: Request Content-Type is not application/json
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "422":
          description: Migration is required or blocked, or governed resolution failed
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "429":
          description: Per-server Architecture resolver concurrency or global request rate limit reached
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
            Retry-After:
              $ref: "#/components/headers/ArchitectureV2RetryAfter"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ArchitectureV2ResolveError"
                  - $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Embedded Architecture v2 authority is unavailable
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "500":
          description: Unexpected resolver or server failure
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ArchitectureV2ResolveError"
                  - $ref: "#/components/schemas/ErrorResponse"
  /api/v1/stackkits:
    get:
      operationId: listStackKits
      summary: List all available StackKits
      tags: [Catalog]
      responses:
        "200":
          description: List of StackKit summaries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/StackKitSummary"
  /api/v1/stackkits/{name}:
    get:
      operationId: getStackKit
      summary: Get full StackKit details
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: Full StackKit configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/StackKit"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/stackkits/{name}/schema:
    get:
      operationId: getStackKitSchema
      summary: Get raw CUE schema for a StackKit
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: CUE schema content
          content:
            text/plain:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/stackkits/{name}/defaults:
    get:
      operationId: getStackKitDefaults
      summary: Get default StackSpec values for a StackKit
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: Default spec values
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/StackSpec"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/validate:
    post:
      operationId: validateSpec
      summary: Validate a stack-spec against its StackKit schema
      tags: [Validation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StackSpec"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ValidationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v1/validate/partial:
    post:
      operationId: validatePartial
      summary: Validate partial spec fields (for wizard step-by-step validation)
      tags: [Validation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial StackSpec fields to validate
      responses:
        "200":
          description: Partial validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ValidationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/generate/tfvars:
    post:
      operationId: generateTFVars
      summary: Generate terraform.tfvars from a validated spec
      tags: [Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: Generated tfvars
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/GenerateResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v1/generate/preview:
    post:
      operationId: generatePreview
      summary: Preview generated infrastructure without writing files
      tags: [Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: Preview of generated output
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/PreviewResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v1/status:
    get:
      operationId: getManagementStatus
      summary: Read node-local StackKit rollout status
      description: Read-only management endpoint for local agents and dashboards.
      tags: [Management]
      responses:
        "200":
          description: Node-local rollout status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ManagementStatus"
  /api/v1/verify:
    post:
      operationId: runManagementVerify
      summary: Run node-local StackKit verification
      description: Runs the same read-only verification surface as `stackkit verify`.
      tags: [Management]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Verification report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/VerifyReport"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/doctor:
    post:
      operationId: runManagementDoctor
      summary: Run read-only node-local diagnostics
      tags: [Management]
      responses:
        "200":
          description: Doctor checks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/DoctorResult"
  /api/v1/plan:
    post:
      operationId: runManagementPlan
      summary: Preview local rollout readiness without mutation
      description: Mutating apply/remove actions are intentionally not exposed by default.
      tags: [Management]
      responses:
        "200":
          description: Read-only local plan readiness
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ManagementPlan"
  /api/v1/runs/{runID}/evidence:
    get:
      operationId: getRunEvidence
      summary: Read rollout evidence by run ID
      tags: [Management]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run evidence bundle
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RunEvidence"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/logs:
    get:
      operationId: listLogs
      summary: List all deploy log runs
      description: Returns a paginated list of deploy log runs sorted by timestamp.
      tags: [Logs]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Number of results to skip
      responses:
        "200":
          description: Paginated list of log runs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunList"
        "503":
          description: Log directory not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/logs/latest:
    get:
      operationId: getLatestLog
      summary: Get the most recent deploy log
      description: Returns all events from the latest deploy log run.
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/LogLevel"
        - $ref: "#/components/parameters/LogPrefix"
      responses:
        "200":
          description: Log events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunDetail"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/logs/{runID}:
    get:
      operationId: getLog
      summary: Get deploy log by run ID
      description: |
        Returns events from a specific deploy log run.
        Use query parameters to filter by level or event prefix.
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/LogLevel"
        - $ref: "#/components/parameters/LogPrefix"
      responses:
        "200":
          description: Log events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/logs/{runID}/stream:
    get:
      operationId: streamLog
      summary: Stream live deploy log events (SSE)
      description: |
        Server-Sent Events stream for real-time deploy progress.
        Events are sent as `data:` lines with JSON payloads.
        A final `event: done` is sent when the deploy completes.

        **Client usage:**
        ```javascript
        const es = new EventSource('/api/v1/logs/20260311-104539/stream');
        es.onmessage = (e) => console.log(JSON.parse(e.data));
        es.addEventListener('done', (e) => { es.close(); });
        ```
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream
        "400":
          $ref: "#/components/responses/BadRequest"
  # ── Node-local setup actions ────────────────────────────────────
  /api/v1/setup/base-hub/protection:
    get:
      operationId: getBaseHubProtection
      summary: Read Base Hub protection state
      description: Used by the Node Hub to hide first-run bootstrap warnings once Base Hub is protected.
      tags: [Setup]
      responses:
        "200":
          description: Base Hub protection state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/BaseHubProtectionResponse"
        "409":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: protectBaseHub
      summary: Protect Base Hub and the node-local API with TinyAuth
      description: |
        Used by the Node Hub `Protect Base Hub` action after owner setup.
        The action persists the protection setting and updates the local Traefik
        dynamic middleware so Base Hub and its node-local API are protected
        without requiring the user to edit variables or run OpenTofu manually.
      tags: [Setup]
      responses:
        "200":
          description: Base Hub protection was activated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/BaseHubProtectionResponse"
        "202":
          description: Protection was validated but not executed in dry-run mode
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/BaseHubProtectionResponse"
        "409":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/BadRequest"
  /api/v1/setup/initial-access:
    get:
      operationId: getInitialAccess
      summary: Read one-time technical bootstrap credential reveal state
      description: |
        Used by the Node Hub after Base Hub protection. The response never
        includes the plaintext password, but it labels the credential boundary
        so clients do not confuse technical bootstrap admin material with the
        PocketID Owner/passkey login.
      tags: [Setup]
      responses:
        "200":
          description: Technical bootstrap credential reveal state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/InitialAccessResponse"
        "409":
          $ref: "#/components/responses/BadRequest"
  /api/v1/setup/initial-access/reveal:
    post:
      operationId: revealInitialAccess
      summary: Reveal technical bootstrap credentials once
      description: |
        Reveals generated TinyAuth/PaaS/service bootstrap credentials one time
        after Base Hub is protected. The Owner login remains PocketID passkey.
        The persisted marker records role and boundary metadata, never the
        plaintext password.
      tags: [Setup]
      responses:
        "200":
          description: Technical bootstrap credentials were revealed and marked consumed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/InitialAccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/BadRequest"
        "410":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/BadRequest"
  /api/v1/setup/services/{service}/run:
    post:
      operationId: runServiceSetup
      summary: Run or validate an on-demand service setup drop
      description: |
        Used by the StackKits Node Hub `Do the setup for me` action. L1/L2
        platform services report that setup is already automatic; L3 services
        with `setupPolicy: automatic` or `setupPolicy: on_demand` are matched
        against the generated platform-app manifest and executed only when
        stackkit-server is running with `STACKKITS_SETUP_ACTION_MODE=apply`.
        Every runner attempt persists a `SetupRun` with phase logs,
        machine-readable evidence, failure class, retry timestamps, and
        rollback notes in `.stackkit/state.yaml`.
      tags: [Setup]
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
          example: photos
      responses:
        "200":
          description: Automatic setup was already present or a setup drop completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ServiceSetupResponse"
        "202":
          description: Setup was validated but not executed in dry-run mode
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ServiceSetupResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/BadRequest"
  # ── Internal runtime actions (TechStack servicecall) ────────────
  /api/v1/internal/runtime-actions/stackkit-rollout:
    post:
      operationId: runtimeStackKitRollout
      summary: Run or dry-run StackKits rollout for TechStack
      description: Requires X-Kombify-Service-Auth from caller techstack.
      tags: [Runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeActionRequest"
      responses:
        "200":
          description: Runtime action accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RuntimeActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/internal/runtime-actions/stackkit-verify:
    post:
      operationId: runtimeStackKitVerify
      summary: Verify StackKits rollout state for TechStack
      description: Requires X-Kombify-Service-Auth from caller techstack.
      tags: [Runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeActionRequest"
      responses:
        "200":
          description: Runtime action accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RuntimeActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/internal/runtime-actions/restore-drill:
    post:
      operationId: runtimeRestoreDrill
      summary: Run or dry-run StackKits restore-drill handoff for TechStack
      description: Requires X-Kombify-Service-Auth from caller techstack.
      tags: [Runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeActionRequest"
      responses:
        "200":
          description: Runtime action accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RuntimeActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  # ── Registry (Direct Connect) ───────────────────────────────────
  /api/v1/registry/instances:
    post:
      operationId: registerInstance
      summary: Register a stackkit-server instance for Direct Connect
      description: |
        Called by stackkit-server after `stackkit apply` to register itself with
        kombify. Cloudflare Edge uses this registry to discover and proxy requests to the
        instance directly.
      tags: [Registry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstanceRegistration"
      responses:
        "201":
          description: Instance registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RegistryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/registry/instances/{instanceId}:
    delete:
      operationId: deregisterInstance
      summary: Remove an instance from the registry
      tags: [Registry]
      parameters:
        - $ref: "#/components/parameters/InstanceId"
      responses:
        "204":
          description: Instance deregistered
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/registry/instances/{instanceId}/heartbeat:
    put:
      operationId: heartbeat
      summary: Send a heartbeat for a registered instance
      description: |
        Sent every 60 seconds by stackkit-server. If no heartbeat is received
        within 3 minutes, the platform edge registry marks the instance as unreachable and stops
        routing traffic to it.
      tags: [Registry]
      parameters:
        - $ref: "#/components/parameters/InstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instance_id, status]
              properties:
                instance_id:
                  type: string
                status:
                  type: string
                  enum: [running, degraded, stopped]
      responses:
        "204":
          description: Heartbeat acknowledged
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    StackKitsAPIKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Required by production deployments; may be disabled only for explicit local development.
  headers:
    ArchitectureV2NoStore:
      description: Architecture intent, plans, and diagnostics must not be cached.
      schema:
        type: string
        const: no-store
    ArchitectureV2RetryAfter:
      description: Seconds before attempting another resolve request.
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
  parameters:
    StackKitName:
      name: name
      in: path
      required: true
      description: StackKit name (e.g., basement-kit)
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
    RunID:
      name: runID
      in: path
      required: true
      description: "Deploy run ID (format: YYYYMMDD-HHMMSS)"
      schema:
        type: string
        pattern: "^\\d{8}-\\d{6}$"
        example: "20260311-104539"
    InstanceId:
      name: instanceId
      in: path
      required: true
      description: Unique instance identifier
      schema:
        type: string
        example: "sh-mylab-abc123-basement-kit-def456"
    LogLevel:
      name: level
      in: query
      description: Filter events by log level
      schema:
        type: string
        enum: [INFO, WARN, ERROR, DEBUG]
    LogPrefix:
      name: prefix
      in: query
      description: "Filter events by message prefix (e.g., apply., decision., tofu.)"
      schema:
        type: string
        example: "apply."
  schemas:
    SuccessEnvelope:
      type: object
      required: [data]
      properties:
        data: {}
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ResponseMeta:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
            message:
              type: string
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ArchitectureV2ResolveRequest:
      type: object
      description: Strict HTTP envelope for Architecture v2 resolution.
      additionalProperties: false
      required: [stackSpec]
      properties:
        stackSpec:
          oneOf:
            - $ref: "#/components/schemas/ArchitectureV2StackSpec"
            - $ref: "#/components/schemas/ArchitectureV1DiagnosticsInput"
        inventory:
          $ref: "#/components/schemas/ArchitectureV2Inventory"
    ArchitectureV2StackSpec:
      type: object
      description: |
        Canonical StackSpec v2 intent. Unknown top-level fields are rejected;
        the embedded CUE authority remains authoritative for all deeper
        cross-field constraints and defaults.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - metadata
        - kit
        - install
        - generation
        - network
        - sites
        - nodes
        - controlPlane
        - capabilities
        - availability
        - partitionPolicy
      properties:
        apiVersion:
          type: string
          const: stackkit/v2alpha1
        kind:
          type: string
          const: StackSpec
        metadata:
          type: object
          additionalProperties: false
          required: [name]
          properties:
            name:
              $ref: "#/components/schemas/ArchitectureV2ContractID"
            stackId:
              $ref: "#/components/schemas/ArchitectureV2ContractID"
            fleetRef:
              $ref: "#/components/schemas/ArchitectureV2ContractID"
        source:
          type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind:
              type: string
              enum: [native-v2, migrated-v1, registry]
            ref:
              type: string
              pattern: "^[^\\s]+$"
            migration:
              type: object
              additionalProperties: true
        kit:
          type: object
          additionalProperties: false
          required: [slug]
          properties:
            slug:
              $ref: "#/components/schemas/ArchitectureV2KitProfile"
            version:
              type: string
        install:
          type: object
        generation:
          type: object
        system:
          type: object
        storage:
          type: object
        network:
          type: object
        container:
          type: object
        sites:
          type: array
          minItems: 1
          items:
            type: object
        nodes:
          type: array
          minItems: 1
          items:
            type: object
        controlPlane:
          type: object
        capabilities:
          type: object
          additionalProperties: false
          required: [enable, disable]
          properties:
            enable:
              type: array
              items:
                $ref: "#/components/schemas/ArchitectureV2ContractID"
            disable:
              type: array
              items:
                $ref: "#/components/schemas/ArchitectureV2ContractID"
            config:
              type: object
              additionalProperties:
                type: object
                additionalProperties: false
                properties:
                  providerRef:
                    $ref: "#/components/schemas/ArchitectureV2ContractID"
                  settings:
                    type: object
                    additionalProperties: true
                  secretRefs:
                    $ref: "#/components/schemas/ArchitectureV2SecretRefs"
        addons:
          type: object
          additionalProperties:
            type: object
        access:
          type: object
          additionalProperties:
            type: object
        bridge:
          type: object
        availability:
          type: object
        deviceEnrollment:
          type: object
        partitionPolicy:
          type: object
        workloads:
          type: object
          additionalProperties:
            type: object
        modules:
          type: object
          additionalProperties:
            type: object
        routes:
          type: object
          additionalProperties:
            type: object
        data:
          type: object
    ArchitectureV1DiagnosticsInput:
      type: object
      description: |
        Lossless legacy StackSpec v1 input accepted only to produce migration
        diagnostics. Fields are deliberately not projected or discarded at the
        HTTP boundary, and this branch can never match a StackSpec v2 header.
      additionalProperties: true
      oneOf:
        - required: [apiVersion]
          properties:
            apiVersion:
              type: string
              const: stackkit/v1
        - not:
            required: [apiVersion]
    ArchitectureV2Inventory:
      type: object
      additionalProperties: false
      required: [schemaVersion, nodes]
      properties:
        schemaVersion:
          type: string
          const: stackkit.inventory/v1
        nodes:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2InventoryNode"
    ArchitectureV2InventoryNode:
      type: object
      additionalProperties: false
      properties:
        observedSiteKind:
          type: string
          enum: [home, cloud]
        arch:
          type: string
          enum: [amd64, arm64]
        cpuCores:
          type: integer
          minimum: 1
        ramGB:
          type: integer
          minimum: 1
        storageGB:
          type: integer
          minimum: 1
        publicAddress:
          type: string
        privateAddress:
          type: string
        virtualization:
          type: string
        provider:
          type: string
        runtimeDaemons:
          type: object
          description: >-
            Observed node-scoped runtime daemons keyed by stable daemonRef. CUE additionally requires instanceRef and socketPath uniqueness per node.
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2RuntimeDaemonFact"
    ArchitectureV2RuntimeDaemonFact:
      type: object
      additionalProperties: false
      required: [instanceRef, engine, socketPath]
      properties:
        instanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        engine:
          type: string
          const: docker
        socketPath:
          $ref: "#/components/schemas/ArchitectureV2UnixSocketPath"
    ArchitectureV2ResolvedPlan:
      type: object
      description: Raw canonical ResolvedPlan response; never a SuccessEnvelope.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - stackId
        - kit
        - compilerVersion
        - sourceIntentHash
        - specHash
        - inventoryHash
        - planHash
        - authority
        - install
        - compatibility
        - generation
        - source
        - sites
        - nodes
        - controlPlane
        - capabilities
        - providers
        - modules
        - runtimeNetworks
        - privilegedInterfaceApprovals
        - placement
        - availability
        - identity
        - data
        - failurePolicy
        - system
        - storage
        - network
        - gates
        - executionReadiness
        - evidence
      properties:
        apiVersion:
          type: string
          const: stackkit.resolved-plan/v1
        kind:
          type: string
          const: ResolvedPlan
        stackId:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        fleetRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kit:
          type: object
          additionalProperties: false
          required: [slug, version, definitionHash]
          properties:
            slug:
              $ref: "#/components/schemas/ArchitectureV2KitProfile"
            version:
              type: string
            definitionHash:
              $ref: "#/components/schemas/ArchitectureV2ContentHash"
        compilerVersion:
          type: string
        sourceIntentHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        specHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        inventoryHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        planHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        authority:
          $ref: "#/components/schemas/ArchitectureV2ResolvedPlanAuthority"
        install:
          type: object
        compatibility:
          type: object
        generation:
          $ref: "#/components/schemas/ArchitectureV2ResolvedGenerationPlan"
        source:
          type: object
        sites:
          type: array
          minItems: 1
          items:
            type: object
        nodes:
          type: array
          minItems: 1
          items:
            type: object
        controlPlane:
          type: object
        capabilities:
          type: array
          minItems: 1
          items:
            type: object
        providers:
          type: array
          minItems: 1
          items:
            type: object
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedModule"
        runtimeNetworks:
          type: array
          uniqueItems: true
          description: >-
            Explicit provider-owned runtime network instances. An empty array is required when no implementation interface needs a network.
          items:
            $ref: "#/components/schemas/ArchitectureV2RuntimeNetwork"
        privilegedInterfaceApprovals:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedPrivilegedInterfaceApproval"
        placement:
          type: array
          items:
            type: object
        addons:
          type: object
          additionalProperties:
            type: object
        access:
          type: object
          additionalProperties:
            type: object
        bridge:
          type: object
        availability:
          type: object
        identity:
          type: object
        data:
          type: object
        failurePolicy:
          type: object
        system:
          type: object
        storage:
          type: object
        network:
          type: object
        gates:
          type: object
        executionReadiness:
          $ref: "#/components/schemas/ArchitectureV2ExecutionReadiness"
        evidence:
          type: array
          minItems: 1
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    ArchitectureV2ResolvedPlanAuthority:
      type: object
      additionalProperties: false
      description: >-
        Exact semantic CUE authority carried by the plan. Product, contract-fixture, and development authorities are disjoint; only product plans are eligible to contribute graduation evidence. The product fingerprint binds the selected Definition and catalog closure, not the build-local distribution bundle.
      required: [class, document, graduationEligible, issuer, catalogHash]
      properties:
        class:
          type: string
          enum: [product, contract-fixture, development]
        document:
          type: string
          enum: [catalog, contractFixtureCatalog]
        graduationEligible:
          type: boolean
        issuer:
          type: string
          pattern: '^\S+$'
        authorityFingerprint:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        catalogHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
      oneOf:
        - required: [authorityFingerprint]
          properties:
            class:
              const: product
            document:
              const: catalog
            graduationEligible:
              const: true
            issuer:
              const: stackkits-product-authority/v1
        - not:
            required: [authorityFingerprint]
          properties:
            class:
              const: contract-fixture
            document:
              const: contractFixtureCatalog
            graduationEligible:
              const: false
            issuer:
              const: stackkits-contract-fixture-authority/v1
        - not:
            required: [authorityFingerprint]
          properties:
            class:
              const: development
            document:
              const: catalog
            graduationEligible:
              const: false
            issuer:
              const: stackkits-development-authority/v1
    ArchitectureV2ResolvedGenerationPlan:
      type: object
      additionalProperties: false
      description: >-
        Versioned, CUE-owned generation plan. Every artifact is bound to either the plan itself or one exact render-instance output.
      required:
        - contractVersion
        - strategy
        - target
        - outputRoot
        - profileContractHash
        - renderer
        - artifacts
        - rawSpecFallback
      properties:
        contractVersion:
          type: string
          pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$'
        strategy:
          type: string
          enum: [kit-template, module-fragments]
        target:
          type: string
          enum: [opentofu, compose, native]
        outputRoot:
          type: string
          pattern: '^(?:\.|[A-Za-z0-9.][A-Za-z0-9._-]*(?:/[A-Za-z0-9._-]+)*)$'
        profileContractHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        renderer:
          $ref: "#/components/schemas/ArchitectureV2ResolvedRendererIdentity"
        artifacts:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2GeneratedArtifact"
        rawSpecFallback:
          type: boolean
          const: false
    ArchitectureV2ResolvedRendererIdentity:
      type: object
      additionalProperties: false
      required: [id, version]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        version:
          type: string
          minLength: 1
    ArchitectureV2GeneratedArtifact:
      type: object
      additionalProperties: false
      required: [id, kind, path, format, mode, required, owner]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          enum: [opentofu, compose, metadata, script, native-config]
        path:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._-]*(/[A-Za-z0-9._-]+)*$'
        format:
          type: string
          enum: [json, yaml, hcl, shell, text]
        mode:
          type: string
          pattern: '^0[0-7]{3}$'
        required:
          type: boolean
          const: true
        owner:
          $ref: "#/components/schemas/ArchitectureV2GeneratedArtifactOwner"
    ArchitectureV2GeneratedArtifactOwner:
      type: object
      additionalProperties: false
      required: [kind]
      oneOf:
        - properties:
            kind:
              const: plan
          not:
            anyOf:
              - required: [moduleRef]
              - required: [unitRef]
              - required: [instanceRef]
              - required: [outputRef]
        - required: [moduleRef, unitRef, instanceRef, outputRef]
          properties:
            kind:
              const: render-instance
      properties:
        kind:
          type: string
          enum: [plan, render-instance]
        moduleRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        unitRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        instanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        outputRef:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
    ArchitectureV2ResolvedModule:
      type: object
      additionalProperties: false
      required:
        - id
        - version
        - contractHash
        - providerRef
        - provides
        - siteRefs
        - nodeRefs
        - runtime
        - renderUnits
        - realizationSupport
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        version:
          type: string
          pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$'
        contractHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        providerRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        provides:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        siteRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        requires:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        runtime:
          type: object
        nodeSelection:
          $ref: "#/components/schemas/ArchitectureV2ModuleNodeSelection"
        runtimeRequirements:
          $ref: "#/components/schemas/ArchitectureV2ModuleRuntimeRequirements"
        renderUnits:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedModuleRenderUnit"
        realizationSupport:
          $ref: "#/components/schemas/ArchitectureV2ModuleRealizationSupport"
        healthGateRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        evidenceGateRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
    ArchitectureV2ModuleNodeSelection:
      type: object
      additionalProperties: false
      required: [authority, controlPlaneMembers]
      properties:
        authority:
          type: string
          enum: [any, control-authority-site, non-control-authority-sites]
        controlPlaneMembers:
          type: string
          enum: [any, only, exclude]
        requiredRoles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [controller, worker, storage, edge]
        matchLabels:
          type: object
          minProperties: 1
          additionalProperties:
            type: string
    ArchitectureV2ModuleRuntimeRequirements:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        allowedArchitectures:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [amd64, arm64]
        minCpuCores:
          type: integer
          minimum: 1
        minRamGB:
          type: integer
          minimum: 1
        minStorageGB:
          type: integer
          minimum: 1
        allowedVirtualization:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [bare-metal, kvm, openvz, lxc, vmware, hyperv, xen, oracle, microsoft, none]
        requireInventoryFacts:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [arch, cpuCores, ramGB, storageGB, virtualization]
    ArchitectureV2ResolvedModuleRenderUnit:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - rendererRef
        - templateRef
        - version
        - contractHash
        - publicInputRefs
        - secretInputRefs
        - values
        - secretRefs
        - outputs
        - siteRefs
        - nodeRefs
        - placement
        - daemonBindings
        - serviceEndpoints
        - instances
        - providesInterfaces
        - requiresInterfaces
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          enum: [compose, cue-fragment, host, job, opentofu, native-config]
        rendererRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        templateRef:
          type: string
          pattern: '^\S+$'
        version:
          type: string
          pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$'
        contractHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        publicInputRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        secretInputRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        values:
          type: object
        secretRefs:
          $ref: "#/components/schemas/ArchitectureV2SecretRefs"
        outputs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
        siteRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        placement:
          $ref: "#/components/schemas/ArchitectureV2RenderUnitPlacement"
        daemonBindings:
          type: array
          uniqueItems: true
          description: >-
            Exact observed daemon identity for every node selected by a one-per-daemon render unit; empty for every other cardinality.
          items:
            $ref: "#/components/schemas/ArchitectureV2RuntimeDaemonBinding"
        serviceEndpoints:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ModuleServiceEndpoint"
        instances:
          type: array
          minItems: 1
          uniqueItems: true
          description: >-
            Exact executable materializations of this immutable logical render unit. The embedded CUE authority binds instance count, deterministic identity, locality, outputs, and placement cardinality.
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedModuleRenderUnitInstance"
        providesInterfaces:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2DockerHTTPReadonlyProvider"
        requiresInterfaces:
          type: array
          uniqueItems: true
          items:
            oneOf:
              - $ref: "#/components/schemas/ArchitectureV2ResolvedDockerHTTPReadonlyRequirement"
              - $ref: "#/components/schemas/ArchitectureV2DockerSocketDirectRequirement"
      allOf:
        - if:
            required: [serviceEndpoints]
            properties:
              serviceEndpoints:
                minItems: 1
          then:
            properties:
              placement:
                properties:
                  scope:
                    const: node-local
    ArchitectureV2ModuleServiceEndpoint:
      type: object
      additionalProperties: false
      required:
        - serviceRef
        - upstreamProtocol
        - targetPort
        - allowedIngressProtocols
        - allowedExposures
        - originSelector
        - healthRef
      properties:
        serviceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        upstreamProtocol:
          type: string
          enum: [tcp, udp, http, https]
        targetPort:
          type: integer
          minimum: 1
          maximum: 65535
        allowedIngressProtocols:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [tcp, udp, http, https]
        allowedExposures:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [local, remote-private, public]
        originSelector:
          type: string
          enum: [single-site, control-authority-site]
        healthRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        data:
          $ref: "#/components/schemas/ArchitectureV2ModuleServiceEndpointData"
    ArchitectureV2ModuleServiceEndpointData:
      type: object
      additionalProperties: false
      required: [bindingRef, requiredClasses, locality]
      properties:
        bindingRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        requiredClasses:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [public, internal, personal, sensitive, secret]
        locality:
          type: string
          enum: [primary-site, primary-or-replica]
    ArchitectureV2ResolvedModuleRenderUnitInstance:
      type: object
      additionalProperties: false
      description: >-
        One explicit renderer invocation. Module-scoped instances never carry fabricated locality; node-local daemon instances carry the complete observed daemon identity or no daemon identity at all.
      required: [id, scope, outputs, networkBindings]
      oneOf:
        - properties:
            scope:
              const: module
          not:
            anyOf:
              - required: [siteRef]
              - required: [nodeRef]
              - required: [daemonRef]
              - required: [daemonInstanceRef]
              - required: [daemonEngine]
              - required: [daemonSocketPath]
        - required: [siteRef, nodeRef]
          properties:
            scope:
              const: node-local
          not:
            anyOf:
              - required: [daemonRef]
              - required: [daemonInstanceRef]
              - required: [daemonEngine]
              - required: [daemonSocketPath]
        - required: [siteRef, nodeRef, daemonRef, daemonInstanceRef, daemonEngine, daemonSocketPath]
          properties:
            scope:
              const: node-local
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        scope:
          type: string
          enum: [module, node-local]
        siteRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonInstanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonEngine:
          type: string
          const: docker
        daemonSocketPath:
          $ref: "#/components/schemas/ArchitectureV2UnixSocketPath"
        outputs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedModuleRenderInstanceOutput"
        networkBindings:
          type: array
          uniqueItems: true
          description: >-
            Exact runtime-network memberships for this renderer invocation. The renderer receives only these instance-bound bindings.
          items:
            $ref: "#/components/schemas/ArchitectureV2RuntimeNetworkBinding"
    ArchitectureV2ResolvedModuleRenderInstanceOutput:
      type: object
      additionalProperties: false
      description: >-
        Exact instance-owned materialization of one immutable logical render output. path is relative to generation.outputRoot.
      required: [ref, artifactRef, path]
      properties:
        ref:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
        artifactRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        path:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
    ArchitectureV2RenderUnitPlacement:
      type: object
      additionalProperties: false
      required: [scope, cardinality]
      oneOf:
        - properties:
            scope:
              const: module
            cardinality:
              const: single
          not:
            required: [daemonRef]
        - properties:
            scope:
              const: node-local
            cardinality:
              const: single
          not:
            required: [daemonRef]
        - properties:
            scope:
              const: node-local
            cardinality:
              const: one-per-node
          not:
            required: [daemonRef]
        - required: [daemonRef]
          properties:
            scope:
              const: node-local
            cardinality:
              const: one-per-daemon
      properties:
        scope:
          type: string
          enum: [module, node-local]
        cardinality:
          type: string
          enum: [single, one-per-node, one-per-daemon]
        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
    ArchitectureV2RuntimeDaemonBinding:
      type: object
