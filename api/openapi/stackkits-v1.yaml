        metadata:
          type: object
          additionalProperties: true
        summary:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            type: object
            additionalProperties: true
    RuntimeActionRequest:
      type: object
      required: [action, stack_id]
      properties:
        action:
          type: string
          enum: [stackkit_rollout, verify_rollout, restore_drill]
        stack_id:
          type: string
        stack_name:
          type: string
        stackkit:
          type: string
        tofu_dir:
          type: string
        unified_path:
          type: string
        owner_spec_bootstrap:
          $ref: "#/components/schemas/RuntimeActionOwnerSpecBootstrap"
        runtime_target:
          $ref: "#/components/schemas/RuntimeActionTarget"
        platform_nodes:
          type: array
          description: Supplemental worker/storage nodes handed off by TechStack for capacity or service placement.
          items:
            $ref: "#/components/schemas/RuntimeActionPlatformNode"
        techstack_enrollment:
          $ref: "#/components/schemas/RuntimeActionTechStackEnrollment"
    RuntimeActionOwnerSpecBootstrap:
      type: object
      required: [endpoint, token, expires_at]
      properties:
        endpoint:
          type: string
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
    RuntimeActionTechStackEnrollment:
      type: object
      description: >-
        Managed runtime enrollment. The lease identity is mandatory so agent inventory and runtime observations cannot be associated with another server.
      required: [lease_id, server_url, server_id, runtime_agent_id, agent_token]
      anyOf:
        - required: [heartbeat_url]
        - required: [inventory_url]
      properties:
        tenant_id:
          type: string
        owner_id:
          type: string
        stack_id:
          type: string
        lease_id:
          type: string
        server_url:
          type: string
          format: uri
        server_id:
          type: string
        runtime_agent_id:
          type: string
        agent_token:
          type: string
          description: Short-lived agent capability. Do not persist or log it.
        heartbeat_url:
          type: string
          format: uri
        inventory_url:
          type: string
          format: uri
        control_urls:
          type: array
          items:
            type: string
            format: uri
        channel_bootstrap:
          type: object
          additionalProperties: true
    RuntimeActionTarget:
      type: object
      description: Primary runtime host used by the rollout. Supplemental nodes must not create another hidden main node.
      properties:
        host:
          type: string
        public_ip:
          type: string
        private_ip:
          type: string
        user:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        docker_host:
          type: string
          format: uri
          pattern: '^ssh://[^/?#]+$'
          description: Managed Docker transport. Must be ssh:// and match runtime_target host, user, and port.
        key_path:
          type: string
        private_key:
          type: string
          description: Short-lived secret material. Not persisted in StackSpec or rollout artifacts.
        client_private_key:
          type: string
          description: Short-lived secret material. Not persisted in StackSpec or rollout artifacts.
        password:
          type: string
    RuntimeActionPlatformNode:
      type: object
      description: Supplemental worker/storage node. Use real platform IDs or a real Komodo Periphery bootstrap path.
      properties:
        name:
          type: string
        role:
          type: string
          enum: [worker, storage, main, standalone, control-plane, foundation]
        ip:
          type: string
        host:
          type: string
        services:
          type: array
          items:
            type: string
        platform:
          $ref: "#/components/schemas/RuntimeActionNodePlatformTarget"
        bootstrap:
          $ref: "#/components/schemas/RuntimeActionNodeBootstrap"
    RuntimeActionNodePlatformTarget:
      type: object
      description: Existing real platform placement identity. StackKits does not synthesize these values.
      properties:
        server_id:
          type: string
        destination_uuid:
          type: string
        environment_id:
          type: string
        project_uuid:
          type: string
        environment_uuid:
          type: string
    RuntimeActionNodeBootstrap:
      type: object
      description: Bootstrap material for platform-specific node registration. Komodo accepts snake_case and TechStack legacy camelCase keys.
      properties:
        komodo_core_address:
          type: string
        komodo_onboarding_key:
          type: string
          description: Short-lived Komodo onboarding key. Not persisted in StackSpec or rollout artifacts.
