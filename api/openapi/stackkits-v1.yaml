        credentials:
          $ref: "#/components/schemas/InitialAccessCredentials"
    InitialAccessCredentials:
      type: object
      properties:
        adminEmail:
          type: string
          format: email
          description: Technical bootstrap admin email, not the PocketID Owner login.
        adminPassword:
          type: string
          format: password
          description: One-time technical bootstrap password. Only present on reveal.
        selectedPaaS:
          type: string
          example: Coolify
        credentialRole:
          type: string
          enum: [technical-admin]
        ownerLogin:
          type: string
          enum: [pocketid-passkey]
        credentialBoundary:
          type: string
        intendedFor:
          type: array
          items:
            type: string
          example: [TinyAuth gateway technical admin, Coolify technical admin]
    ServiceSetupResponse:
      type: object
      properties:
        serviceKey:
          type: string
          example: photos
        displayName:
          type: string
          example: Immich
        appName:
          type: string
          example: immich
        setupPolicy:
          type: string
          enum: [manual, on_demand, automatic]
        setupActionLabel:
          type: string
          example: Do the setup for me
        mode:
          type: string
          enum: [dry-run, apply]
        status:
          type: string
          enum: [already_automatic, ready, waiting, completed]
        message:
          type: string
        drops:
          type: array
          items:
            $ref: "#/components/schemas/SetupDropResult"
    SetupDropResult:
      type: object
      properties:
        name:
          type: string
          example: immich-owner-bootstrap
        runId:
          type: string
          description: Persistent SetupRun id from .stackkit/state.yaml when executed.
        version:
          type: string
          example: 0.1.0
        runner:
          type: string
          example: stackkit-script
        description:
          type: string
        status:
          type: string
          enum: [ready, running, waiting, completed, failed]
        phase:
          type: string
          enum: [desired, prepared, owner_activated, configured, verified]
        attempts:
          type: integer
          minimum: 1
          description: Number of persisted runner attempts for this setup drop.
        message:
          type: string
        error:
          type: string
        failureClass:
          type: string
          example: setup_credentials_missing
        evidence:
          type: object
          additionalProperties:
            type: string
          description: Machine-readable setup proof such as credential boundaries, token posture, seeded content, or verified handoff state. Secret values are never included.
        logs:
          type: array
          items:
            $ref: "#/components/schemas/SetupRunLogEntry"
        rollbackNotes:
          type: array
          items:
            type: string
        lastRequested:
          type: string
          format: date-time
        lastStarted:
          type: string
          format: date-time
        lastFinished:
          type: string
          format: date-time
    SetupRunLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        phase:
          type: string
          enum: [desired, prepared, owner_activated, configured, verified]
        level:
          type: string
          enum: [info, warning, error]
        message:
          type: string
    LogRunSummary:
      type: object
      properties:
        run_id:
          type: string
          description: "Unique run identifier (format: YYYYMMDD-HHMMSS)"
          example: "20260311-104539"
        timestamp:
          type: string
          format: date-time
          description: Run start time in RFC3339
        file:
          type: string
          description: Log filename
          example: "20260311-104539.jsonl"
    LogRunList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LogRunSummary"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    LogRunDetail:
      type: object
      properties:
        run_id:
          type: string
          example: "20260311-104539"
        events:
          type: array
          items:
            $ref: "#/components/schemas/LogEvent"
        total:
          type: integer
          description: Number of events (after filtering)
    LogEvent:
      type: object
      description: |
        A structured deploy log event. Common fields include:
        - `time` (RFC3339Nano timestamp)
        - `level` (INFO, WARN, ERROR, DEBUG)
        - `msg` (event name, e.g. apply.start, tofu.apply, decision.template)
        - `elapsed_ms` (milliseconds since CLI run start)
        Additional fields vary by event type.
      properties:
        time:
          type: string
          format: date-time
        level:
          type: string
          enum: [INFO, WARN, ERROR, DEBUG]
        msg:
          type: string
          description: "Event name (e.g., apply.start, tofu.apply, decision.template)"
        elapsed_ms:
          type: integer
          description: Milliseconds since CLI run started
      additionalProperties: true
    InstanceRegistration:
      type: object
      required: [instance_id, endpoint_url, stackkit, services, status]
      properties:
        instance_id:
          type: string
          description: Unique instance identifier (device fingerprint + stackkit name)
          example: "sh-mylab-abc123-basement-kit-def456"
        endpoint_url:
          type: string
          format: uri
          description: Public URL where stackkit-server is reachable
          example: "https://api.sh-mylab-abc123.kombify.me"
        stackkit:
          type: string
          example: "basement-kit"
        version:
          type: string
          example: "1.0.0"
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceInfo"
        status:
          type: string
          enum: [running, degraded, stopped]
        api_port:
          type: integer
          example: 8082
        last_seen:
          type: string
          format: date-time
    ServiceInfo:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          example: "traefik"
        url:
          type: string
          format: uri
        status:
          type: string
          enum: [running, stopped, error]
    RegistryResponse:
      type: object
      properties:
        instance_id:
          type: string
        status:
          type: string
        message:
          type: string
    HealthData:
      type: object
      properties:
        status:
          type: string
          enum: [healthy]
        service:
          type: string
        version:
          type: string
  responses:
    HealthResponse:
      description: Service is healthy
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - properties:
                  data:
                    $ref: "#/components/schemas/HealthData"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Validation or generation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
