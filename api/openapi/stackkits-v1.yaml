          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RuntimeActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "410":
          $ref: "#/components/responses/LegacyRuntimeActionRetired"
  /api/v1/internal/runtime-actions/stackkit-verify:
    post:
      operationId: runtimeStackKitVerify
      summary: Verify exact-v0.6 legacy StackKits rollout state for TechStack
      deprecated: true
      description: >-
        Exact-v0.6 compatibility only. Native v0.7 returns 410 before decoding or executing this legacy deployment action; use the governed Architecture v2 verification contract instead.
      tags: [Runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeActionLegacyRequest"
      responses:
        "200":
          description: Runtime action accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RuntimeActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "410":
          $ref: "#/components/responses/LegacyRuntimeActionRetired"
  /api/v1/internal/runtime-actions/restore-drill:
    post:
      operationId: runtimeRestoreDrill
      summary: Run the exact-v0.6 legacy restore-drill handoff for TechStack
      deprecated: true
      description: >-
        Exact-v0.6 compatibility only. Native v0.7 returns 410 before decoding or executing this legacy deployment action. This deployment restore drill is distinct from the independently versioned backup API.
      tags: [Runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeActionRequest"
      responses:
        "200":
          description: Runtime action accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RuntimeActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "410":
          $ref: "#/components/responses/LegacyRuntimeActionRetired"
  # ── Registry (Direct Connect) ───────────────────────────────────
  /api/v1/registry/instances:
    post:
      operationId: registerInstance
      summary: Register a stackkit-server instance for Direct Connect
      description: |
        Exact-v0.6 in-memory compatibility registry only. It does not publish
        to Kombify, Cloudflare, TechStack, or another central authority and
        cannot prove Direct Connect registration. Native v0.7 returns 501
        before payload decode or map mutation.
      tags: [Registry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstanceRegistration"
      responses:
        "201":
          description: Instance registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RegistryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  /api/v1/registry/instances/{instanceId}:
    delete:
      operationId: deregisterInstance
      summary: Remove an instance from the registry
      description: Exact-v0.6 in-memory compatibility operation. Native v0.7 returns 501.
      tags: [Registry]
      parameters:
        - $ref: "#/components/parameters/InstanceId"
      responses:
        "204":
          description: Instance deregistered
        "404":
          $ref: "#/components/responses/NotFound"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  /api/v1/registry/instances/{instanceId}/heartbeat:
    put:
      operationId: heartbeat
      summary: Send a heartbeat for a registered instance
      description: |
        Exact-v0.6 in-memory compatibility heartbeat only. It has no external
        edge-registry effect. Native v0.7 returns 501 before payload decode or
        map mutation.
      tags: [Registry]
      parameters:
        - $ref: "#/components/parameters/InstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instance_id, status]
              properties:
                instance_id:
                  type: string
                status:
                  type: string
                  enum: [running, degraded, stopped]
      responses:
        "204":
          description: Heartbeat acknowledged
        "404":
          $ref: "#/components/responses/NotFound"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
components:
  securitySchemes:
    StackKitsAPIKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Required by production deployments; may be disabled only for explicit local development.
  headers:
    ArchitectureV2NoStore:
      description: Architecture intent, plans, and diagnostics must not be cached.
      schema:
        type: string
        const: no-store
    ArchitectureV2RetryAfter:
      description: Seconds before attempting another resolve request.
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
  parameters:
    RILActionTenantHeader:
      name: X-Kombify-Tenant-ID
      in: header
      required: true
      description: Exact tenant identity asserted by the authenticated TechStack service caller.
      schema:
        $ref: "#/components/schemas/RILActionStableID"
    StackKitName:
      name: name
      in: path
      required: true
      description: StackKit name (e.g., basement-kit)
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
    RunID:
      name: runID
      in: path
      required: true
      description: "Deploy run ID (format: YYYYMMDD-HHMMSS)"
      schema:
        type: string
        pattern: "^\\d{8}-\\d{6}$"
        example: "20260311-104539"
    InstanceId:
      name: instanceId
      in: path
      required: true
      description: Unique instance identifier
      schema:
        type: string
        example: "sh-mylab-abc123-basement-kit-def456"
    LogLevel:
      name: level
      in: query
      description: Filter events by log level
      schema:
        type: string
        enum: [INFO, WARN, ERROR, DEBUG]
    LogPrefix:
      name: prefix
      in: query
      description: "Filter events by message prefix (e.g., apply., decision., tofu.)"
      schema:
        type: string
        example: "apply."
  schemas:
    SuccessEnvelope:
      type: object
      required: [data]
      properties:
        data: {}
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ResponseMeta:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
            message:
              type: string
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ArchitectureV2ResolveRequest:
      type: object
      description: Strict HTTP envelope for Architecture v2 resolution.
      additionalProperties: false
      required: [stackSpec]
      properties:
        stackSpec:
          oneOf:
            - $ref: "#/components/schemas/ArchitectureV2StackSpec"
            - $ref: "#/components/schemas/ArchitectureV1DiagnosticsInput"
        inventory:
          $ref: "#/components/schemas/ArchitectureV2Inventory"
    RILActionHandoffRequest:
      type: object
      description: Exact provider-free kombify-go-common/rilaction approved-action handoff.
      additionalProperties: false
      required: [api_version, action_card_id, execution_id, trace_id, tenant_id, stack_id, primitive, resolved_plan_hash, approval, grant, target, inputs, evidence_sink_ref, issued_at, valid_until, nonce, idempotency_key]
      properties:
        api_version: {type: string, const: stackkit.ril-action-handoff/v1alpha1}
        action_card_id: {$ref: "#/components/schemas/RILActionStableID"}
        execution_id: {$ref: "#/components/schemas/RILActionStableID"}
        trace_id: {$ref: "#/components/schemas/RILActionStableID"}
        tenant_id: {$ref: "#/components/schemas/RILActionStableID"}
        stack_id: {$ref: "#/components/schemas/RILActionStableID"}
        primitive: {$ref: "#/components/schemas/RILActionPrimitiveBinding"}
        resolved_plan_hash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        approval: {$ref: "#/components/schemas/RILActionApprovalBinding"}
        grant: {$ref: "#/components/schemas/RILActionGrantBinding"}
        target: {$ref: "#/components/schemas/RILActionTargetBinding"}
        inputs:
          type: [array, "null"]
          maxItems: 16
          items: {$ref: "#/components/schemas/RILActionInput"}
        evidence_sink_ref: {$ref: "#/components/schemas/RILActionOpaqueRef"}
        issued_at: {$ref: "#/components/schemas/ArchitectureV2UTCTimestamp"}
        valid_until: {$ref: "#/components/schemas/ArchitectureV2UTCTimestamp"}
        nonce: {$ref: "#/components/schemas/RILActionStableID"}
        idempotency_key: {$ref: "#/components/schemas/RILActionStableID"}
    RILActionPrimitiveBinding:
      type: object
      additionalProperties: false
      required: [id, contract_hash, operation_class]
      properties:
        id: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        contract_hash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        operation_class: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
    RILActionApprovalBinding:
      type: object
      additionalProperties: false
      required: [receipt_ref, receipt_hash, decision, class, approved_at, valid_until]
      properties:
        receipt_ref: {$ref: "#/components/schemas/RILActionOpaqueRef"}
        receipt_hash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        decision: {type: string, const: approved}
        class: {type: string, enum: [owner-step-up, break-glass]}
        approved_at: {$ref: "#/components/schemas/ArchitectureV2UTCTimestamp"}
        valid_until: {$ref: "#/components/schemas/ArchitectureV2UTCTimestamp"}
    RILActionGrantBinding:
      type: object
      additionalProperties: false
      required: [binding_ref, binding_hash, audience, scopes, granted_at, valid_until]
      properties:
        binding_ref: {$ref: "#/components/schemas/RILActionOpaqueRef"}
        binding_hash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        audience: {type: string, const: stackkits}
        scopes:
          type: array
          minItems: 1
          maxItems: 16
          uniqueItems: true
          items: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        granted_at: {$ref: "#/components/schemas/ArchitectureV2UTCTimestamp"}
        valid_until: {$ref: "#/components/schemas/ArchitectureV2UTCTimestamp"}
    RILActionTargetBinding:
      type: object
      additionalProperties: false
      required: [scope]
      properties:
        scope: {type: string, enum: [stack, module-instance, runtime-instance]}
        site_ref: {$ref: "#/components/schemas/RILActionStableID"}
        node_ref: {$ref: "#/components/schemas/RILActionStableID"}
        module_instance_ref: {$ref: "#/components/schemas/RILActionStableID"}
        runtime_instance_ref: {$ref: "#/components/schemas/RILActionStableID"}
        execution_channel_ref: {$ref: "#/components/schemas/RILActionStableID"}
    RILActionInput:
      type: object
      additionalProperties: false
      required: [id, type]
      properties:
        id: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        type: {type: string, enum: [opaque-reference, boolean, integer, string-enum]}
        opaque_ref: {$ref: "#/components/schemas/RILActionOpaqueRef"}
        boolean: {type: boolean}
        integer: {type: integer, format: int64}
        enum: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
    RILActionEvidence:
      type: object
      description: Exact public-safe kombify-go-common/rilaction execution evidence.
      additionalProperties: false
      required: [api_version, evidence_id, evidence_sink_ref, action_card_id, execution_id, trace_id, tenant_id, stack_id, primitive_id, primitive_contract_hash, resolved_plan_hash, request_digest, executor_ref, target_ref, status, verification, recovery, summary_codes, evaluated_at]
      properties:
        api_version: {type: string, const: stackkit.ril-action-evidence/v1}
        evidence_id: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        evidence_sink_ref: {$ref: "#/components/schemas/RILActionOpaqueRef"}
        action_card_id: {$ref: "#/components/schemas/RILActionStableID"}
        execution_id: {$ref: "#/components/schemas/RILActionStableID"}
        trace_id: {$ref: "#/components/schemas/RILActionStableID"}
        tenant_id: {$ref: "#/components/schemas/RILActionStableID"}
        stack_id: {$ref: "#/components/schemas/RILActionStableID"}
        primitive_id: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        primitive_contract_hash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        resolved_plan_hash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        request_digest: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        executor_ref: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        target_ref: {$ref: "#/components/schemas/RILActionOpaqueRef"}
        status: {type: string, enum: [succeeded, failed]}
        verification: {$ref: "#/components/schemas/RILActionVerificationEvidence"}
        recovery: {$ref: "#/components/schemas/RILActionRecoveryEvidence"}
        summary_codes:
          type: array
          minItems: 1
          maxItems: 16
          uniqueItems: true
          items: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        protected_diagnostic_ref: {$ref: "#/components/schemas/RILActionOpaqueRef"}
        evaluated_at: {$ref: "#/components/schemas/ArchitectureV2UTCTimestamp"}
    RILActionVerificationEvidence:
      type: object
      additionalProperties: false
      required: [kind, status, runtime_state_observed, checks]
      properties:
        kind: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        status: {type: string, enum: [passed, failed]}
        runtime_state_observed: {type: boolean}
        checks:
          type: array
          minItems: 1
          maxItems: 16
          uniqueItems: true
          items:
            type: object
            additionalProperties: false
            required: [id, status]
            properties:
              id: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
              status: {type: string, enum: [passed, failed]}
    RILActionRecoveryEvidence:
      type: object
      additionalProperties: false
      required: [kind, status]
      properties:
        kind: {type: string, enum: [none, primitive, manual]}
        status: {type: string, enum: [not-required, succeeded, failed, manual-required]}
        primitive_ref: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
    RILActionStableID:
      type: string
      minLength: 1
      maxLength: 128
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]*$'
      not: {pattern: '://'}
    RILActionOpaqueRef:
      type: string
      maxLength: 223
      pattern: '^[a-z][a-z0-9-]{0,31}:[A-Za-z0-9][A-Za-z0-9._/-]{0,190}$'
      not:
        pattern: '^(credential|doppler|key|password|secret|token|vault):'
    ArchitectureV2InitialAuthoringRequest:
      type: object
      description: >-
        Native v0.7 initial StackSpec materialization request. Overrides are deliberately limited to the paths governed by the embedded Definition authoring contract; this is not an arbitrary partial-spec overlay.
      additionalProperties: false
      required: [apiVersion, kind, kitProfile]
      properties:
        apiVersion:
          type: string
          const: stackkit/v2alpha1
        kind:
          type: string
          const: InitialStackSpecAuthoring
        kitProfile:
          $ref: "#/components/schemas/ArchitectureV2KitProfile"
        overrides:
          type: object
          additionalProperties: false
          properties:
            "metadata.name":
              $ref: "#/components/schemas/ArchitectureV2ContractID"
            "network.domain.base":
              type: string
    ArchitectureV2InitialAuthoringResponse:
      type: object
      description: >-
        CUE-governed initial StackSpec authoring contract. stack_spec, spec_hash, and validation_scope are omitted when required user overrides prevent honest materialization. No field in this response is an inventory, plan, generation, or execution-readiness claim.
      additionalProperties: false
      required:
        - source_version
        - kit_profile
        - authoring_contract_version
        - authoring_status
        - required_overrides
      properties:
        valid:
          type: boolean
        source_version:
          type: string
          const: v2alpha1
        kit_profile:
          $ref: "#/components/schemas/ArchitectureV2KitProfile"
        authoring_contract_version:
          type: string
        authoring_status:
          type: string
          enum: [supported, preview]
        required_overrides:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [metadata.name, network.domain.base]
        stack_spec:
          $ref: "#/components/schemas/ArchitectureV2StackSpec"
        spec_hash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        validation_scope:
          type: string
          const: spec-only
    ArchitectureV2InitialAuthoringValidation:
      allOf:
        - $ref: "#/components/schemas/ArchitectureV2InitialAuthoringResponse"
        - type: object
          required: [valid, stack_spec, spec_hash, validation_scope]
          properties:
            valid:
              type: boolean
              const: true
    ArchitectureV2StackSpec:
      type: object
      description: |
        Canonical StackSpec v2 intent. Unknown top-level fields are rejected;
        the embedded CUE authority remains authoritative for all deeper
        cross-field constraints and defaults.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - metadata
        - kit
        - install
        - generation
        - network
        - sites
        - nodes
        - controlPlane
        - capabilities
        - availability
        - partitionPolicy
      properties:
        apiVersion:
          type: string
          const: stackkit/v2alpha1
        kind:
          type: string
          const: StackSpec
        metadata:
          type: object
          additionalProperties: false
          required: [name]
          properties:
            name:
              $ref: "#/components/schemas/ArchitectureV2ContractID"
            stackId:
              $ref: "#/components/schemas/ArchitectureV2ContractID"
            fleetRef:
              $ref: "#/components/schemas/ArchitectureV2ContractID"
        source:
          type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind:
              type: string
              enum: [native-v2, migrated-v1, registry]
            ref:
              type: string
              pattern: "^[^\\s]+$"
            migration:
              type: object
              additionalProperties: true
        kit:
          type: object
          additionalProperties: false
          required: [slug]
          properties:
            slug:
              $ref: "#/components/schemas/ArchitectureV2KitProfile"
            version:
              type: string
        install:
          type: object
        generation:
          type: object
        system:
          type: object
        storage:
          type: object
        network:
          type: object
        container:
          type: object
        sites:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ArchitectureV2SiteSpec"
        nodes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ArchitectureV2NodeSpec"
        controlPlane:
          type: object
        capabilities:
          type: object
          additionalProperties: false
          required: [enable, disable]
          properties:
            enable:
              type: array
              items:
                $ref: "#/components/schemas/ArchitectureV2ContractID"
            disable:
              type: array
              items:
                $ref: "#/components/schemas/ArchitectureV2ContractID"
            config:
              type: object
              additionalProperties:
                type: object
                additionalProperties: false
                properties:
                  providerRef:
                    $ref: "#/components/schemas/ArchitectureV2ContractID"
                  settings:
                    type: object
                    additionalProperties: true
                  secretRefs:
                    $ref: "#/components/schemas/ArchitectureV2SecretRefs"
        addons:
          type: object
          additionalProperties:
            type: object
        access:
          type: object
          additionalProperties:
            type: object
        lanDiscovery:
          $ref: "#/components/schemas/ArchitectureV2LANDiscoveryIntent"
        bridge:
          type: object
        availability:
          type: object
        deviceEnrollment:
          type: object
        partitionPolicy:
          type: object
        workloads:
          type: object
          additionalProperties:
            type: object
        modules:
          type: object
          additionalProperties:
            type: object
        routes:
          type: object
          additionalProperties:
            type: object
        data:
          type: object
    ArchitectureV2LANDiscoveryIntent:
      type: object
      description: >-
        Explicit allowlist of local Home routes that may be advertised on the LAN. An absent or empty list never infers advertisements from routes.
      additionalProperties: false
      properties:
        advertiseRouteRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
    ArchitectureV2HomeLANDiscovery:
      type: object
      description: >-
        Closed compiler-owned Home LAN discovery projection. It carries only explicitly authorized advertisement identity and listener fields.
      additionalProperties: false
      required: [homeSiteRefs, advertisements]
      properties:
        homeSiteRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        advertisements:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2HomeLANAdvertisement"
    ArchitectureV2HomeLANAdvertisement:
      type: object
      additionalProperties: false
      required: [routeRef, serviceRef, originSiteRef, originNodeRefs, protocol, port, host, access]
      properties:
        routeRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        serviceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        originSiteRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        originNodeRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        protocol:
          type: string
          enum: [http, https, tcp, udp]
        port:
          type: integer
          minimum: 1
          maximum: 65535
        host:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9.-]*[A-Za-z0-9]$'
          not:
            pattern: '(^|\.)[Ll][Oo][Cc][Aa][Ll][Hh][Oo][Ss][Tt]$'
        access:
          $ref: "#/components/schemas/ArchitectureV2HomeLANAdvertisementAccess"
    ArchitectureV2HomeLANAdvertisementAccess:
      type: object
      additionalProperties: false
      required: [policyRef, policyExposure, defaultClosed]
      properties:
        policyRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        policyExposure:
          type: string
          const: lan
        defaultClosed:
          type: boolean
          const: true
    ArchitectureV2SiteSpec:
      type: object
      description: >-
        Provider-neutral placement intent. A site identifies trust and failure domains; it never identifies a server provider, account, region, datacenter, native resource, credential, or management address.
      additionalProperties: false
      required: [id, kind, failureDomain]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          enum: [home, cloud]
        name:
          type: string
        failureDomain:
          type: string
          minLength: 1
        network:
          type: object
          additionalProperties: false
          properties:
            serviceCIDRs:
              type: array
              items:
                type: string
            storageCIDRs:
              type: array
              items:
                type: string
        labels:
          type: object
          additionalProperties:
            type: string
    ArchitectureV2NodeSpec:
      type: object
      description: >-
        Provider-neutral logical node intent. Host identity, connection details, addresses, and server lifecycle are supplied only through an opaque ExternalHostBinding after the intent is normalized.
      additionalProperties: false
      required: [id, siteRef, roles, hardware, failureDomain]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        siteRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        roles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [controller, worker, storage, edge]
        hardware:
          type: object
          additionalProperties: false
          properties:
            arch:
              type: string
              enum: [amd64, arm64]
            virtualization:
              $ref: "#/components/schemas/ArchitectureV2RuntimeVirtualization"
            profile:
              type: string
              enum: [standard, pi, gpu, storage]
            cpuCores:
              type: integer
              minimum: 1
            ramGB:
              type: integer
              minimum: 1
            storageGB:
              type: integer
              minimum: 1
        failureDomain:
          type: string
          minLength: 1
        labels:
          type: object
          additionalProperties:
            type: string
        enabled:
          type: boolean
    ArchitectureV1DiagnosticsInput:
      type: object
      description: |
        Lossless legacy StackSpec v1 input accepted only to produce migration
        diagnostics. Fields are deliberately not projected or discarded at the
        HTTP boundary, and this branch can never match a StackSpec v2 header.
      additionalProperties: true
      oneOf:
        - required: [apiVersion]
          properties:
            apiVersion:
              type: string
              const: stackkit/v1
        - not:
            required: [apiVersion]
    ArchitectureV2Inventory:
      type: object
      additionalProperties: false
      required: [schemaVersion, nodes]
      properties:
        schemaVersion:
          type: string
          const: stackkit.inventory/v1
        nodes:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2InventoryNode"
        externalHomeAccessBindings:
          type: object
          description: >-
            Optional externally issued Home access bindings, keyed first by Home Site and then by the exact access capability.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2ExternalHomeAccessBinding"
        externalBackupTargetBindings:
          type: object
          description: >-
            Optional externally issued Cloud backup target bindings, keyed by Cloud Site and offsite-object-backup capability.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2ExternalBackupTargetBinding"
        externalHomeBackupTargetBindings:
          type: object
          description: >-
            Optional opaque Home encrypted-backup target bindings, keyed by Home Site and encrypted-offsite-backup capability.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2ExternalHomeBackupTargetBinding"
        externalFederationLinkBindings:
          type: object
          description: Optional opaque Modern Federation link bindings keyed by inter-site-link.
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2ExternalFederationLinkBinding"
    ArchitectureV2InventoryNode:
      type: object
      additionalProperties: false
      properties:
        observedSiteKind:
          type: string
          enum: [home, cloud]
        arch:
          type: string
          enum: [amd64, arm64]
        cpuCores:
          type: integer
          minimum: 1
        ramGB:
          type: integer
          minimum: 1
        storageGB:
          type: integer
          minimum: 1
        virtualization:
          $ref: "#/components/schemas/ArchitectureV2RuntimeVirtualization"
        externalHostBinding:
          $ref: "#/components/schemas/ArchitectureV2ExternalHostBinding"
        hostConformanceReceipt:
          $ref: "#/components/schemas/ArchitectureV2HostConformanceReceipt"
        runtimeDaemons:
          type: object
          description: >-
            Observed node-scoped runtime daemons keyed by stable daemonRef. CUE additionally requires instanceRef and socketPath uniqueness per node.
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2RuntimeDaemonFact"
    ArchitectureV2ExternalHostBinding:
      type: object
      description: >-
        Opaque, hash-bound handoff for an already supplied host. This contract grants an execution channel but no authority to provision, resize, snapshot, delete, or otherwise manage a server-provider resource.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - bindingRef
        - stackId
        - nodeRef
        - hostRef
        - inventoryRef
        - executionChannelRef
        - secretRefs
        - stackkitsVersion
        - candidateDigest
        - specHash
        - hostRequirementsHash
        - inventoryHash
        - issuedAt
        - validUntil
        - bindingHash
      properties:
        apiVersion:
          type: string
          const: stackkit.external-host-binding/v1
        kind:
          type: string
          const: ExternalHostBinding
        bindingRef:
          type: string
          pattern: '^host-binding://sha256/[a-f0-9]{64}$'
        stackId:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        hostRef:
          type: string
          pattern: '^host://sha256/[a-f0-9]{64}$'
        inventoryRef:
          type: string
          pattern: '^host-inventory://sha256/[a-f0-9]{64}$'
        executionChannelRef:
          type: string
          pattern: '^execution-channel://sha256/[a-f0-9]{64}$'
        secretRefs:
          $ref: "#/components/schemas/ArchitectureV2SecretRefs"
        stackkitsVersion:
          type: string
          pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
        candidateDigest:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        specHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        hostRequirementsHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        inventoryHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        issuedAt:
          $ref: "#/components/schemas/ArchitectureV2UTCTimestamp"
        validUntil:
          description: Must be after issuedAt and no more than 24 hours later.
          $ref: "#/components/schemas/ArchitectureV2UTCTimestamp"
        bindingHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
    ArchitectureV2HomeAccessRequirement:
