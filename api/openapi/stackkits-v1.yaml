        expires_at:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
    RuntimeActionTechStackEnrollment:
      type: object
      description: >-
        Managed runtime enrollment. The lease identity is mandatory so agent inventory and runtime observations cannot be associated with another server.
      required: [lease_id, server_url, server_id, runtime_agent_id, agent_token]
      anyOf:
        - required: [heartbeat_url]
        - required: [inventory_url]
      properties:
        tenant_id:
          type: string
        owner_id:
          type: string
        stack_id:
          type: string
        lease_id:
          type: string
        server_url:
          type: string
          format: uri
        server_id:
          type: string
        runtime_agent_id:
          type: string
        agent_token:
          type: string
          description: Short-lived agent capability. Do not persist or log it.
        heartbeat_url:
          type: string
          format: uri
        inventory_url:
          type: string
          format: uri
        control_urls:
          type: array
          items:
            type: string
            format: uri
        channel_bootstrap:
          type: object
          additionalProperties: true
    RuntimeActionTarget:
      type: object
      description: Primary runtime host used by the rollout. Supplemental nodes must not create another hidden main node.
      properties:
        host:
          type: string
        public_ip:
          type: string
        private_ip:
          type: string
        user:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        docker_host:
          type: string
          format: uri
          pattern: '^ssh://[^/?#]+$'
          description: Managed Docker transport. Must be ssh:// and match runtime_target host, user, and port.
        key_path:
          type: string
        private_key:
          type: string
          description: Short-lived secret material. Not persisted in StackSpec or rollout artifacts.
        client_private_key:
          type: string
          description: Short-lived secret material. Not persisted in StackSpec or rollout artifacts.
        password:
          type: string
    RuntimeActionPlatformNode:
      type: object
      description: Supplemental worker/storage node. Use real platform IDs or a real Komodo Periphery bootstrap path.
      properties:
        name:
          type: string
        role:
          type: string
          enum: [worker, storage, main, standalone, control-plane, foundation]
        ip:
          type: string
        host:
          type: string
        services:
          type: array
          items:
            type: string
        platform:
          $ref: "#/components/schemas/RuntimeActionNodePlatformTarget"
        bootstrap:
          $ref: "#/components/schemas/RuntimeActionNodeBootstrap"
    RuntimeActionNodePlatformTarget:
      type: object
      description: Existing real platform placement identity. StackKits does not synthesize these values.
      properties:
        server_id:
          type: string
        destination_uuid:
          type: string
        environment_id:
          type: string
        project_uuid:
          type: string
        environment_uuid:
          type: string
    RuntimeActionNodeBootstrap:
      type: object
      description: Bootstrap material for platform-specific node registration. Komodo accepts snake_case and TechStack legacy camelCase keys.
      properties:
        komodo_core_address:
          type: string
        komodo_onboarding_key:
          type: string
          description: Short-lived Komodo onboarding key. Not persisted in StackSpec or rollout artifacts.
        ssh:
          $ref: "#/components/schemas/RuntimeActionSSHBootstrap"
    RuntimeActionSSHBootstrap:
      type: object
      properties:
        host:
          type: string
        user:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        key_path:
          type: string
        key_pem:
          type: string
        private_key:
          type: string
        client_private_key:
          type: string
        proxy_jump:
          type: string
    RuntimeActionResponse:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, ready, applied, verified, skipped, failed]
        action:
          type: string
          enum: [stackkit_rollout, verify_rollout, restore_drill]
        stack_id:
          type: string
        stack_name:
          type: string
        stackkit:
          type: string
        tofu_dir:
          type: string
        unified_path:
          type: string
        mode:
          type: string
          enum: [dry-run, apply]
        checks:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeActionCheck"
        stackkit_outputs:
          $ref: "#/components/schemas/RuntimeActionStackKitOutputs"
        observation:
          $ref: "#/components/schemas/RuntimeActionLiveObservation"
        platform_refs:
          type: array
          description: Raw selected-PaaS deployment refs returned by the platform adapter.
          items:
            $ref: "#/components/schemas/RuntimeActionDeploymentRef"
        platform_system_apps:
          type: array
          description: Artifact-ready selected-PaaS state for StackKit-owned system apps.
          items:
            $ref: "#/components/schemas/RuntimeActionPlatformAppState"
        platform_apps:
          type: array
          description: Artifact-ready selected-PaaS state for StackKit-owned L3 apps.
          items:
            $ref: "#/components/schemas/RuntimeActionPlatformAppState"
    RuntimeActionDeploymentRef:
      type: object
      properties:
        platform:
          type: string
        appName:
          type: string
        externalId:
          type: string
        deploymentId:
          type: string
        observedStatus:
          type: string
        observedAt:
          type: string
          format: date-time
        lastDeployed:
          type: string
          format: date-time
    RuntimeActionLiveObservation:
      type: object
      description: >-
        Versioned, persistable live-runtime evidence. Dashboard health must be derived from this measurement rather than rollout jobs, leases, or stackkit_outputs.
      properties:
        version:
          type: string
          example: stackkit.runtime-observation/v1
        observed_at:
          type: string
          format: date-time
        host:
          $ref: "#/components/schemas/RuntimeActionObservationHost"
        platform:
          $ref: "#/components/schemas/RuntimeActionObservationPlatform"
        services:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeActionServiceObservation"
        failure_class:
          type: string
    RuntimeActionObservationHost:
      type: object
      properties:
        host:
          type: string
        reachable:
          type: boolean
        docker_reachable:
          type: boolean
        failure_class:
          type: string
    RuntimeActionObservationPlatform:
      type: object
      properties:
        name:
          type: string
        endpoint:
          type: string
          format: uri
        server_id:
          type: string
        project_uuid:
          type: string
        environment_uuid:
          type: string
        destination_uuid:
          type: string
    RuntimeActionServiceObservation:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          description: Normalized measured service health.
          enum: [starting, healthy, unhealthy, unknown]
        platform_app_id:
          type: string
        platform_status:
          type: string
          description: Raw current platform adapter observation, not a dashboard health value.
        containers:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeActionContainerObservation"
        health_path:
          type: string
        probe:
          $ref: "#/components/schemas/RuntimeActionHTTPProbeObservation"
        failure_class:
          type: string
    RuntimeActionContainerObservation:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        state:
          type: string
        running:
          type: boolean
        health:
          type: string
          enum: [healthy, unhealthy, starting, none, unknown]
    RuntimeActionHTTPProbeObservation:
      type: object
      properties:
        url:
          type: string
          format: uri
        reached:
          type: boolean
        status_code:
          type: integer
          minimum: 100
          maximum: 599
        failure_class:
          type: string
    RuntimeActionPlatformAppState:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        platform:
          type: string
        management:
          type: string
          enum: [managed, handoff, unmanaged, fallback]
        externalId:
          type: string
        deploymentId:
          type: string
        observedStatus:
          type: string
        observedAt:
          type: string
          format: date-time
        composePath:
          type: string
        setupPolicy:
          type: string
          enum: [manual, on_demand, automatic]
        setupDrops:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeActionSetupDrop"
        lastDeployed:
          type: string
          format: date-time
    RuntimeActionSetupDrop:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        runner:
          type: string
        description:
          type: string
        rollbackNotes:
          type: array
          items:
            type: string
        command:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        secrets:
          type: object
          additionalProperties:
            type: string
    RuntimeActionCheck:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ok, warning, missing, reference, skipped, failed]
        detail:
          type: string
    RuntimeActionStackKitOutputs:
      type: object
      properties:
        identity:
          $ref: "#/components/schemas/RuntimeActionIdentityOutputs"
        login_gateway:
          $ref: "#/components/schemas/RuntimeActionLoginGatewayOutput"
        recovery:
          $ref: "#/components/schemas/RuntimeActionRecoveryOutput"
        services:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeActionServiceOutput"
        metadata:
          type: object
          additionalProperties:
            type: string
    RuntimeActionIdentityOutputs:
      type: object
      properties:
        owner:
          $ref: "#/components/schemas/RuntimeActionOwnerIdentity"
        recovery:
          $ref: "#/components/schemas/RuntimeActionRecoveryOutput"
    RuntimeActionOwnerIdentity:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        display_name:
          type: string
        subject:
          type: string
        provider:
          type: string
    RuntimeActionLoginGatewayOutput:
      type: object
      properties:
        url:
          type: string
        label:
          type: string
        admin_url:
          type: string
    RuntimeActionRecoveryOutput:
      type: object
      properties:
        bundle_ref:
          type: string
        secret_ref:
          type: string
        machine_secret_ref:
          type: string
        passphrase_hash_present:
          type: boolean
    RuntimeActionServiceOutput:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        admin_url:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    BaseHubProtectionResponse:
      type: object
      properties:
        status:
          type: string
          enum: [bootstrap_open, protected, ready, completed]
        mode:
          type: string
          enum: [dry-run, apply]
        protected:
          type: boolean
        message:
          type: string
        tfvarsUpdated:
          type: boolean
        dynamicConfigUpdated:
          type: boolean
    InitialAccessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [available, consumed, unavailable, protected_required]
        mode:
          type: string
          enum: [one-time]
        protected:
          type: boolean
        available:
          type: boolean
        consumed:
          type: boolean
        credentialRole:
          type: string
          enum: [technical-admin]
        ownerLogin:
          type: string
          enum: [pocketid-passkey]
        credentialBoundary:
          type: string
          example: Bootstrap/service setup credentials; Owner login stays PocketID passkey.
        message:
          type: string
        credentials:
          $ref: "#/components/schemas/InitialAccessCredentials"
    InitialAccessCredentials:
      type: object
      properties:
        adminEmail:
          type: string
          format: email
          description: Technical bootstrap admin email, not the PocketID Owner login.
        adminPassword:
          type: string
          format: password
          description: One-time technical bootstrap password. Only present on reveal.
        selectedPaaS:
          type: string
          example: Coolify
        credentialRole:
          type: string
          enum: [technical-admin]
        ownerLogin:
          type: string
          enum: [pocketid-passkey]
        credentialBoundary:
          type: string
        intendedFor:
          type: array
          items:
            type: string
          example: [TinyAuth gateway technical admin, Coolify technical admin]
    ServiceSetupResponse:
      type: object
      properties:
        serviceKey:
          type: string
          example: photos
        displayName:
          type: string
          example: Immich
        appName:
          type: string
          example: immich
        setupPolicy:
          type: string
          enum: [manual, on_demand, automatic]
        setupActionLabel:
          type: string
          example: Do the setup for me
        mode:
          type: string
          enum: [dry-run, apply]
        status:
          type: string
          enum: [already_automatic, ready, waiting, completed]
        message:
          type: string
        drops:
          type: array
          items:
            $ref: "#/components/schemas/SetupDropResult"
    SetupDropResult:
      type: object
      properties:
        name:
          type: string
          example: immich-owner-bootstrap
        runId:
          type: string
          description: Persistent SetupRun id from .stackkit/state.yaml when executed.
        version:
          type: string
          example: 0.1.0
        runner:
          type: string
          example: stackkit-script
        description:
          type: string
        status:
          type: string
          enum: [ready, running, waiting, completed, failed]
        phase:
          type: string
          enum: [desired, prepared, owner_activated, configured, verified]
        attempts:
          type: integer
          minimum: 1
          description: Number of persisted runner attempts for this setup drop.
        message:
          type: string
        error:
          type: string
        failureClass:
          type: string
          example: setup_credentials_missing
        evidence:
          type: object
          additionalProperties:
            type: string
          description: Machine-readable setup proof such as credential boundaries, token posture, seeded content, or verified handoff state. Secret values are never included.
        logs:
          type: array
          items:
            $ref: "#/components/schemas/SetupRunLogEntry"
        rollbackNotes:
          type: array
          items:
            type: string
        lastRequested:
          type: string
          format: date-time
        lastStarted:
          type: string
          format: date-time
        lastFinished:
          type: string
          format: date-time
    SetupRunLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        phase:
          type: string
          enum: [desired, prepared, owner_activated, configured, verified]
        level:
          type: string
          enum: [info, warning, error]
        message:
          type: string
    LogRunSummary:
      type: object
      properties:
        run_id:
          type: string
          description: "Unique run identifier (format: YYYYMMDD-HHMMSS)"
          example: "20260311-104539"
        timestamp:
          type: string
          format: date-time
          description: Run start time in RFC3339
        file:
          type: string
          description: Log filename
          example: "20260311-104539.jsonl"
    LogRunList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LogRunSummary"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    LogRunDetail:
      type: object
      properties:
        run_id:
          type: string
          example: "20260311-104539"
        events:
          type: array
          items:
            $ref: "#/components/schemas/LogEvent"
        total:
          type: integer
          description: Number of events (after filtering)
    LogEvent:
      type: object
      description: |
        A structured deploy log event. Common fields include:
        - `time` (RFC3339Nano timestamp)
        - `level` (INFO, WARN, ERROR, DEBUG)
        - `msg` (event name, e.g. apply.start, tofu.apply, decision.template)
        - `elapsed_ms` (milliseconds since CLI run start)
        Additional fields vary by event type.
      properties:
        time:
          type: string
          format: date-time
        level:
          type: string
          enum: [INFO, WARN, ERROR, DEBUG]
        msg:
          type: string
          description: "Event name (e.g., apply.start, tofu.apply, decision.template)"
        elapsed_ms:
          type: integer
          description: Milliseconds since CLI run started
      additionalProperties: true
    InstanceRegistration:
      type: object
      required: [instance_id, endpoint_url, stackkit, services, status]
      properties:
        instance_id:
          type: string
          description: Unique instance identifier (device fingerprint + stackkit name)
          example: "sh-mylab-abc123-basement-kit-def456"
        endpoint_url:
          type: string
          format: uri
          description: Public URL where stackkit-server is reachable
          example: "https://api.sh-mylab-abc123.kombify.me"
        stackkit:
          type: string
          example: "basement-kit"
        version:
          type: string
          example: "1.0.0"
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceInfo"
        status:
          type: string
          enum: [running, degraded, stopped]
        api_port:
          type: integer
          example: 8082
        last_seen:
          type: string
          format: date-time
    ServiceInfo:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          example: "traefik"
        url:
          type: string
          format: uri
        status:
          type: string
          enum: [running, stopped, error]
    RegistryResponse:
      type: object
      properties:
        instance_id:
          type: string
        status:
          type: string
        message:
          type: string
    HealthData:
      type: object
      properties:
        status:
          type: string
          enum: [healthy]
        service:
          type: string
        version:
          type: string
  responses:
    HealthResponse:
      description: Service is healthy
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - properties:
                  data:
                    $ref: "#/components/schemas/HealthData"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing internal service authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Invalid internal service authentication or tenant binding
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Validation or generation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    OperationalUnavailable:
      description: Native Architecture v2 operation requires an exact verified ResolvedPlan and execution evidence.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ArchitectureV2ResolveError"
    LegacyRuntimeActionRetired:
      description: Native v0.7 retired this legacy deployment action before request decoding or execution.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
tags:
  - name: Architecture
    description: Canonical Architecture v2 intent resolution and migration diagnostics
  - name: Health
    description: Health checks
  - name: Discovery
    description: API capabilities and documentation
  - name: Catalog
    description: StackKit catalog — browse, search, and inspect available templates
  - name: Validation
    description: CUE-based spec validation
  - name: Generation
    description: OpenTofu variable generation from validated specs
  - name: Management
    description: Node-local read-only management endpoints for agents, dashboards, and MCP tools
  - name: Logs
    description: Deploy log retrieval and live streaming for dashboards and agents
  - name: Setup
    description: Node-local service setup actions for Dashboard-triggered first-run bootstraps
  - name: Runtime
    description: Servicecall-protected runtime actions consumed by TechStack
  - name: Registry
    description: Direct Connect instance registry — deployed stackkit-servers register here so the platform edge can proxy to them
