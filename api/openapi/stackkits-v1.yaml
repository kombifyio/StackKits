        docker_reachable:
          type: boolean
        failure_class:
          type: string
    RuntimeActionObservationPlatform:
      type: object
      properties:
        name:
          type: string
        endpoint:
          type: string
          format: uri
        server_id:
          type: string
        project_uuid:
          type: string
        environment_uuid:
          type: string
        destination_uuid:
          type: string
    RuntimeActionServiceObservation:
