openapi: "3.1.0"
info:
  title: kombify StackKits API
  version: "1.0.0"
  description: |
    kombify StackKits HTTP API — pre-packaged homelab infrastructure templates
    with CUE schema validation and OpenTofu generation. Designed for consumption
    by the kombify Stack control plane and AI agents via the kombify Gateway.
  contact:
    name: kombify
    url: https://kombify.io
  license:
    name: MIT
servers:
  - url: http://localhost:8082
    description: Local development
  - url: https://api.kombify.io/stackkits
    description: Production (via Cloudflare Edge)
paths:
  /health:
    get:
      operationId: healthRoot
      summary: Root health check
      tags: [Health]
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"
  /api/v1/health:
    get:
      operationId: health
      summary: Service health check
      tags: [Health]
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"
  /api/v1/capabilities:
    get:
      operationId: getCapabilities
      summary: List all API capabilities (AI agent discovery)
      tags: [Discovery]
      responses:
        "200":
          description: List of capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
  /api/v1/openapi.yaml:
    get:
      operationId: getOpenAPISpec
      summary: Get OpenAPI 3.1 specification
      tags: [Discovery]
      responses:
        "200":
          description: YAML OpenAPI spec
          content:
            application/yaml:
              schema:
                type: string
  /api/v2/resolve:
    post:
      operationId: resolveArchitectureV2
      summary: Resolve canonical Architecture v2 intent
      description: |
        Resolves a canonical StackSpec v2 and optional observed inventory through
        the embedded governed CUE authority. The successful response is the raw,
        canonical ResolvedPlan document; it is not wrapped in a success envelope.
        StackSpec v1 input is never compiled implicitly and instead returns a
        machine-readable migration report. Production deployments require the
        X-API-Key security scheme; explicitly unauthenticated local-development
        deployments may use the anonymous alternative. Requests are bounded to
        64 JSON nesting levels, 65,536 JSON tokens, and 4,096 entries per
        individual object or array before governed CUE resolution begins.
      tags: [Architecture]
      security:
        - StackKitsAPIKey: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchitectureV2ResolveRequest"
      responses:
        "200":
          description: Canonical ResolvedPlan bytes
          headers:
            Cache-Control:
              description: Resolved deployment plans must not be cached.
              schema:
                type: string
                const: no-store
            ETag:
              description: Strong ETag containing the quoted ResolvedPlan planHash.
              schema:
                type: string
                pattern: '^"sha256:[a-f0-9]{64}"$'
            X-StackKit-Plan-Hash:
              description: Unquoted ResolvedPlan planHash.
              schema:
                $ref: "#/components/schemas/ArchitectureV2ContentHash"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolvedPlan"
        "400":
          description: Invalid JSON envelope, StackSpec, or inventory
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "401":
          description: Missing API key when authentication is enabled
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid API key when authentication is enabled
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Resolve request exceeds the one-mebibyte body limit
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "415":
          description: Request Content-Type is not application/json
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "422":
          description: Migration is required or blocked, or governed resolution failed
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "429":
          description: Per-server Architecture resolver concurrency or global request rate limit reached
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
            Retry-After:
              $ref: "#/components/headers/ArchitectureV2RetryAfter"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ArchitectureV2ResolveError"
                  - $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Embedded Architecture v2 authority is unavailable
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolveError"
        "500":
          description: Unexpected resolver or server failure
          headers:
            Cache-Control:
              $ref: "#/components/headers/ArchitectureV2NoStore"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ArchitectureV2ResolveError"
                  - $ref: "#/components/schemas/ErrorResponse"
  /api/v1/stackkits:
    get:
      operationId: listStackKits
      summary: List all available StackKits
      tags: [Catalog]
      responses:
        "200":
          description: List of StackKit summaries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/StackKitSummary"
  /api/v1/stackkits/{name}:
    get:
      operationId: getStackKit
      summary: Get full StackKit details
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: Full StackKit configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/StackKit"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/stackkits/{name}/schema:
    get:
      operationId: getStackKitSchema
      summary: Get raw CUE schema for a StackKit
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: CUE schema content
          content:
            text/plain:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/stackkits/{name}/defaults:
    get:
      operationId: getStackKitDefaults
      summary: Read versioned initial StackSpec authoring data for a StackKit
      description: >-
        Exact v0.6 servers return the legacy StackSpec defaults. Native v0.7 servers return CUE-governed Architecture v2 authoring metadata and include a canonical initial StackSpec only when no user override is required. The v2 response is spec-only evidence and never asserts inventory, plan, generation, or execution readiness.
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: Default spec values
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/StackSpec"
                          - $ref: "#/components/schemas/ArchitectureV2InitialAuthoringResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/validate:
    post:
      operationId: validateSpec
      summary: Validate a stack-spec against its StackKit schema
      description: >-
        Canonical StackSpec v2 is validated against the embedded CUE authority and produces spec-only evidence. On native v0.7, StackSpec v1 remains accepted only for read-only validation and migration diagnostics; it is never operationally admitted.
      tags: [Validation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ArchitectureV2StackSpec"
                - $ref: "#/components/schemas/ArchitectureV1DiagnosticsInput"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/ArchitectureV2SpecValidation"
                          - $ref: "#/components/schemas/ArchitectureV1ReadOnlyValidation"
                          - $ref: "#/components/schemas/LegacyValidationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v1/validate/partial:
    post:
      operationId: validatePartial
      summary: Validate versioned initial StackSpec authoring input
      description: >-
        Exact v0.6 servers retain legacy partial StackSpec validation. Native v0.7 servers accept only the governed Architecture v2 initial-authoring request and materialize a complete CUE-valid StackSpec. Arbitrary partial StackSpec overlays are not accepted on the v0.7 line.
      tags: [Validation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  description: Legacy v0.6 partial StackSpec fields without an Architecture v2 discriminator.
                  not:
                    required: [apiVersion]
                - $ref: "#/components/schemas/ArchitectureV2InitialAuthoringRequest"
      responses:
        "200":
          description: Partial validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/ValidationResult"
                          - $ref: "#/components/schemas/ArchitectureV2InitialAuthoringValidation"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/generate/tfvars:
    post:
      operationId: generateTFVars
      summary: Generate terraform.tfvars from a validated spec
      description: >-
        Exact-v0.6 compatibility endpoint only. Native v0.7 does not advertise this capability and returns a typed migration/not-supported error before composition. Architecture v2 generation consumes an Inventory-bound ResolvedPlan through the governed CLI/executor path.
      deprecated: true
      tags: [Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: Generated tfvars
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/GenerateResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v1/generate/preview:
    post:
      operationId: generatePreview
      summary: Preview generated infrastructure without writing files
      description: >-
        Exact-v0.6 compatibility endpoint only. Native v0.7 does not advertise this capability and never treats spec-only input as generation-ready.
      deprecated: true
      tags: [Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: Preview of generated output
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/PreviewResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v1/status:
    get:
      operationId: getManagementStatus
      summary: Read node-local StackKit rollout status
      description: >-
        Read-only status. Native v0.7 validates the local StackSpec v2 and reports spec-only/resolve-required state without claiming operational readiness. Exact v0.6 retains legacy rollout status fields.
      tags: [Management]
      responses:
        "200":
          description: Node-local rollout status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ManagementStatus"
  /api/v1/verify:
    post:
      operationId: runManagementVerify
      summary: Run node-local StackKit verification
      description: >-
        Exact-v0.6 compatibility verifier. Native v0.7 returns 501 until this endpoint consumes the exact verified ResolvedPlan and execution evidence; use the Architecture v2 CLI/executor verification path meanwhile.
      deprecated: true
      tags: [Management]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Verification report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/VerifyReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  /api/v1/doctor:
    post:
      operationId: runManagementDoctor
      summary: Run read-only node-local diagnostics
      description: >-
        Exact-v0.6 compatibility diagnostics. Native v0.7 returns 501 instead of interpreting legacy deployment files as Architecture v2 readiness.
      deprecated: true
      tags: [Management]
      responses:
        "200":
          description: Doctor checks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/DoctorResult"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  /api/v1/plan:
    post:
      operationId: runManagementPlan
      summary: Preview local rollout readiness without mutation
      description: >-
        Exact-v0.6 compatibility preview. Native v0.7 returns 501 because plan readiness belongs to the exact verified ResolvedPlan, not Terraform file presence.
      deprecated: true
      tags: [Management]
      responses:
        "200":
          description: Read-only local plan readiness
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ManagementPlan"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  /api/v1/runs/{runID}/evidence:
    get:
      operationId: getRunEvidence
      summary: Read rollout evidence by run ID
      tags: [Management]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run evidence bundle
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RunEvidence"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/logs:
    get:
      operationId: listLogs
      summary: List all deploy log runs
      description: Returns a paginated list of deploy log runs sorted by timestamp.
      tags: [Logs]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Number of results to skip
      responses:
        "200":
          description: Paginated list of log runs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunList"
        "503":
          description: Log directory not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/logs/latest:
    get:
      operationId: getLatestLog
      summary: Get the most recent deploy log
      description: Returns all events from the latest deploy log run.
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/LogLevel"
        - $ref: "#/components/parameters/LogPrefix"
      responses:
        "200":
          description: Log events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunDetail"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/logs/{runID}:
    get:
      operationId: getLog
      summary: Get deploy log by run ID
      description: |
        Returns events from a specific deploy log run.
        Use query parameters to filter by level or event prefix.
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/LogLevel"
        - $ref: "#/components/parameters/LogPrefix"
      responses:
        "200":
          description: Log events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/logs/{runID}/stream:
    get:
      operationId: streamLog
      summary: Stream live deploy log events (SSE)
      description: |
        Server-Sent Events stream for real-time deploy progress.
        Events are sent as `data:` lines with JSON payloads.
        A final `event: done` is sent when the deploy completes.

        **Client usage:**
        ```javascript
        const es = new EventSource('/api/v1/logs/20260311-104539/stream');
        es.onmessage = (e) => console.log(JSON.parse(e.data));
        es.addEventListener('done', (e) => { es.close(); });
        ```
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream
        "400":
          $ref: "#/components/responses/BadRequest"
  # ── Node-local setup actions ────────────────────────────────────
  /api/v1/setup/base-hub/protection:
    get:
      operationId: getBaseHubProtection
      summary: Read Base Hub protection state
      description: Exact-v0.6 Node Hub compatibility state. Native v0.7 returns 501 before legacy artifact reads.
      tags: [Setup]
      responses:
        "200":
          description: Base Hub protection state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/BaseHubProtectionResponse"
        "409":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
    post:
      operationId: protectBaseHub
      summary: Protect Base Hub and the node-local API with TinyAuth
      description: |
        Used by the Node Hub `Protect Base Hub` action after owner setup.
        The action persists the protection setting and updates the local Traefik
        dynamic middleware so Base Hub and its node-local API are protected
        without requiring the user to edit variables or run OpenTofu manually.
        This is exact-v0.6 compatibility behavior. Native v0.7 returns 501
        before reading or writing legacy tfvars, state, or Traefik artifacts.
      tags: [Setup]
      responses:
        "200":
          description: Base Hub protection was activated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/BaseHubProtectionResponse"
        "202":
          description: Protection was validated but not executed in dry-run mode
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/BaseHubProtectionResponse"
        "409":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  /api/v1/setup/initial-access:
    get:
      operationId: getInitialAccess
      summary: Read one-time technical bootstrap credential reveal state
      description: |
        Used by the Node Hub after Base Hub protection. The response never
        includes the plaintext password, but it labels the credential boundary
        so clients do not confuse technical bootstrap admin material with the
        PocketID Owner/passkey login.
        This is exact-v0.6 compatibility state; native v0.7 returns 501.
      tags: [Setup]
      responses:
        "200":
          description: Technical bootstrap credential reveal state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/InitialAccessResponse"
        "409":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  /api/v1/setup/initial-access/reveal:
    post:
      operationId: revealInitialAccess
      summary: Reveal technical bootstrap credentials once
      description: |
        Reveals generated TinyAuth/PaaS/service bootstrap credentials one time
        after Base Hub is protected. The Owner login remains PocketID passkey.
        The persisted marker records role and boundary metadata, never the
        plaintext password.
        This is exact-v0.6 compatibility behavior; native v0.7 returns 501
        before credential-state access.
      tags: [Setup]
      responses:
        "200":
          description: Technical bootstrap credentials were revealed and marked consumed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/InitialAccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/BadRequest"
        "410":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  /api/v1/setup/services/{service}/run:
    post:
      operationId: runServiceSetup
      summary: Run or validate an on-demand service setup drop
      description: |
        Used by the StackKits Node Hub `Do the setup for me` action. L1/L2
        platform services report that setup is already automatic; L3 services
        with `setupPolicy: automatic` or `setupPolicy: on_demand` are matched
        against the generated platform-app manifest and executed only when
        stackkit-server is running with `STACKKITS_SETUP_ACTION_MODE=apply`.
        Every runner attempt persists a `SetupRun` with phase logs,
        machine-readable evidence, failure class, retry timestamps, and
        rollback notes in `.stackkit/state.yaml`.
        This is exact-v0.6 compatibility behavior. Native v0.7 returns 501
        before manifest reads, external service calls, or state writes.
      tags: [Setup]
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
          example: photos
      responses:
        "200":
          description: Automatic setup was already present or a setup drop completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ServiceSetupResponse"
        "202":
          description: Setup was validated but not executed in dry-run mode
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ServiceSetupResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/OperationalUnavailable"
  # ── Internal runtime actions (TechStack servicecall) ────────────
  /api/v2/internal/ril-actions/resolve:
    post:
      operationId: resolveRILActionAuthorityV2
      summary: Bind a tenant-owned current resolution for RIL execution
      description: >-
        Requires X-Kombify-Service-Auth from caller techstack and the exact X-Kombify-Tenant-ID transport context. The response is the raw canonical ResolvedPlan and the server retains only its opaque CurrentResolution execution proof.
      tags: [Runtime]
      parameters:
        - $ref: "#/components/parameters/RILActionTenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchitectureV2ResolveRequest"
      responses:
        "200":
          description: Canonical ResolvedPlan bound as the current tenant execution authority
          headers:
            ETag:
              schema: {type: string, pattern: '^"sha256:[a-f0-9]{64}"$'}
            X-StackKit-Plan-Hash:
              schema: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureV2ResolvedPlan"
        "400": {$ref: "#/components/responses/BadRequest"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "413": {$ref: "#/components/responses/BadRequest"}
        "415": {$ref: "#/components/responses/BadRequest"}
        "422": {$ref: "#/components/responses/BadRequest"}
        "429": {$ref: "#/components/responses/BadRequest"}
        "503": {$ref: "#/components/responses/BadRequest"}
  /api/v2/internal/ril-actions/execute:
    post:
      operationId: executeApprovedRILActionV2
      summary: Execute one exact approved provider-free RIL action
      description: >-
        Requires X-Kombify-Service-Auth from caller techstack and the exact X-Kombify-Tenant-ID transport context. The body and response are the shared kombify-go-common/rilaction request and evidence documents, without a StackKits success envelope.
      tags: [Runtime]
      parameters:
        - $ref: "#/components/parameters/RILActionTenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RILActionHandoffRequest"
      responses:
        "200":
          description: Stable public-safe action evidence; inspect evidence.status for success or failure
          headers:
            X-StackKits-RIL-Execution-Status:
              schema: {type: string, enum: [succeeded, failed]}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RILActionEvidence"
        "400": {$ref: "#/components/responses/BadRequest"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "409": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/BadRequest"}
        "415": {$ref: "#/components/responses/BadRequest"}
        "422": {$ref: "#/components/responses/BadRequest"}
        "501": {$ref: "#/components/responses/BadRequest"}
        "503": {$ref: "#/components/responses/BadRequest"}
  /api/v2/internal/runtime-actions/stackkit-rollout:
    post:
      operationId: runtimeStackKitRolloutV2
      summary: Admit a governed Architecture v2 StackKit rollout
      description: >-
        Requires X-Kombify-Service-Auth from caller techstack. This route accepts only the closed provider-free StackSpec+Inventory contract and returns 501 until its governed renderer/executor is implemented.
      tags: [Runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeActionArchitectureV2RolloutRequest"
      responses:
        "200":
          description: Runtime action accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RuntimeActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/BadRequest"
        "415":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/BadRequest"
  /api/v2/internal/runtime-actions/stackkit-verify:
    post:
      operationId: runtimeStackKitVerifyV2
      summary: Admit governed Architecture v2 StackKit verification
      description: >-
        Requires X-Kombify-Service-Auth from caller techstack. This closed route cannot fall through to legacy remote transport while the governed verifier is unimplemented.
      tags: [Runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeActionArchitectureV2VerifyRequest"
      responses:
        "200":
          description: Runtime action accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RuntimeActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/BadRequest"
        "415":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/BadRequest"
        "501":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/BadRequest"
  /api/v1/internal/runtime-actions/stackkit-rollout:
    post:
      operationId: runtimeStackKitRollout
      summary: Run the exact-v0.6 legacy StackKits rollout for TechStack
      deprecated: true
      description: >-
        Exact-v0.6 compatibility only. Native v0.7 returns 410 before decoding or executing this legacy deployment action; use the governed Architecture v2 runtime-action contract instead.
      tags: [Runtime]
