        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        policyProfile:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
    ArchitectureV2ImplementationInterfaceBinding:
      type: object
      additionalProperties: false
      required: [interfaceRef, moduleRef, unitRef, providerInstanceRef, consumerInstanceRef, siteRef, nodeRef, daemonRef, daemonInstanceRef, networkRef, networkInstanceRef, policyProfile, endpointRef]
      properties:
        interfaceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        moduleRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        unitRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        providerInstanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        consumerInstanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        siteRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonInstanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        networkRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        networkInstanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        policyProfile:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        endpointRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
    ArchitectureV2ResolvedDockerHTTPReadonlyRequirement:
      type: object
      additionalProperties: false
      required: [id, kind, protocol, version, endpoint, scopes, coLocation, daemonRef, policyProfile, providerBindings]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          const: docker-http-readonly-v1
        protocol:
          type: string
          const: docker-http
        version:
          type: string
          const: v1
        endpoint:
          $ref: "#/components/schemas/ArchitectureV2DockerHTTPReadonlyEndpoint"
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [CONTAINERS, EVENTS, NETWORKS, PING, VERSION, INFO, SERVICES, TASKS]
        coLocation:
          type: string
          const: same-node-and-network
        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        policyProfile:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        providerBindings:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ImplementationInterfaceBinding"
    ArchitectureV2DockerSocketDirectRequirement:
      type: object
      additionalProperties: false
      required: [id, kind, protocol, version, endpoint, scopes, coLocation, daemonRef, policyProfile]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          const: docker-socket-direct-v1
        protocol:
          type: string
          const: docker-engine
        version:
          type: string
          const: v1
        endpoint:
          type: object
          additionalProperties: false
          description: >-
            Selects exactly one socket-path authority. path asserts one fixed path across all selected daemons; pathSource=daemon-binding takes the exact path from each resolved node-scoped daemon binding.
          required: [visibility, transport]
          oneOf:
            - required: [path]
            - required: [pathSource]
          properties:
            visibility:
              type: string
              const: node-local
            transport:
              type: string
              const: unix-socket
            path:
              $ref: "#/components/schemas/ArchitectureV2UnixSocketPath"
            pathSource:
              type: string
              const: daemon-binding
        scopes:
          type: array
          minItems: 1
          maxItems: 1
          items:
            type: string
            const: docker-api:full
        coLocation:
          type: string
          const: same-node
        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        policyProfile:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
    ArchitectureV2ResolvedPrivilegedInterfaceApproval:
      type: object
      additionalProperties: false
      description: >-
        Exact node- and site-bound Docker socket exception. It does not grant host filesystem, root mount, process, or metrics observation authority.
      required: [id, kind, moduleRef, unitRef, providerRef, daemonRef, policyProfile, reasonCode, evidenceRef, siteRefs, nodeRefs, evidenceGateRef]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          const: docker-socket-direct-v1
        moduleRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        unitRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        providerRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        policyProfile:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        reasonCode:
          type: string
          enum: [provider-backing, lifecycle-owner]
        evidenceRef:
          type: string
          pattern: '^\S+$'
        siteRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        evidenceGateRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
    ArchitectureV2ModuleRealizationSupport:
      type: object
      additionalProperties: false
      required: [contractVersion, scope, level, compatibleRendererRefs, inputs, artifacts, evidence]
      properties:
        contractVersion:
          type: string
          const: 1.0.0
        scope:
          type: string
          enum: [umbrella, concrete]
        level:
          type: string
          enum: [contract-only, generation-ready, apply-ready]
        compatibleRendererRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        inputs:
          type: object
          additionalProperties: false
          required: [contractComplete, requiredRefs]
          properties:
            contractComplete:
              type: boolean
            requiredRefs:
              type: array
              uniqueItems: true
              items:
                $ref: "#/components/schemas/ArchitectureV2ContractID"
        artifacts:
          type: object
          additionalProperties: false
          required: [requiredRefs, outputBindings, contracts]
          properties:
            requiredRefs:
              type: array
              uniqueItems: true
              items:
                $ref: "#/components/schemas/ArchitectureV2ContractID"
            outputBindings:
              type: array
              items:
                $ref: "#/components/schemas/ArchitectureV2ModuleArtifactOutputBinding"
            contracts:
              type: array
              uniqueItems: true
              items:
                $ref: "#/components/schemas/ArchitectureV2ModuleGenerationArtifact"
        evidence:
          type: object
          additionalProperties: false
          required: [requiredRefs]
          properties:
            requiredRefs:
              type: array
              uniqueItems: true
              items:
                type: string
                pattern: '^\S+$'
    ArchitectureV2ModuleArtifactOutputBinding:
      type: object
      additionalProperties: false
      required: [artifactRef, unitRef, outputRef]
      properties:
        artifactRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        unitRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        outputRef:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
    ArchitectureV2ModuleGenerationArtifact:
      type: object
      additionalProperties: false
      description: CUE-owned generation metadata and exact render-unit output ownership for one selected-module artifact.
      required: [id, kind, format, mode, required, compatibleTargets, unitRef, outputRef]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          enum: [opentofu, compose, metadata, script, native-config]
        format:
          type: string
          enum: [json, yaml, hcl, shell, text]
        mode:
          type: string
          pattern: '^0[0-7]{3}$'
        required:
          type: boolean
          const: true
        compatibleTargets:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [opentofu, compose]
        unitRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        outputRef:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
    ArchitectureV2ResolveError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - invalid_stackspec
            - invalid_inventory
            - migration_required
            - migration_blocked
            - authority_load
            - resolve_failed
            - request_too_large
            - unsupported_media_type
            - resolve_busy
        message:
          type: string
        migrationReport:
          $ref: "#/components/schemas/ArchitectureV2MigrationReport"
    ArchitectureV2MigrationReport:
      type: object
      additionalProperties: false
      required:
        - sourceVersion
        - targetVersion
        - status
        - requiresExplicitAcceptance
        - decisions
        - warnings
        - manualActions
        - blockers
      properties:
        sourceVersion:
          type: string
        targetVersion:
          type: string
        status:
          type: string
          enum: [ready-for-shadow-resolution, blocked]
        requiresExplicitAcceptance:
          type: boolean
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2MigrationDecision"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2MigrationWarning"
        manualActions:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2MigrationManualAction"
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2MigrationBlocker"
    ArchitectureV2MigrationDecision:
      type: object
      additionalProperties: false
      required: [code, field, to, reason]
      properties:
        code:
          type: string
        field:
          type: string
        from:
          type: string
        to:
          type: string
        reason:
          type: string
    ArchitectureV2MigrationWarning:
      type: object
      additionalProperties: false
      required: [code, field, message]
      properties:
        code:
          type: string
        field:
          type: string
        message:
          type: string
        requiredAction:
          type: string
    ArchitectureV2MigrationManualAction:
      type: object
      additionalProperties: false
      required: [code, fields, message, required]
      properties:
        code:
          type: string
        fields:
          type: array
          items:
            type: string
        message:
          type: string
        required:
          type: boolean
    ArchitectureV2MigrationBlocker:
      type: object
      additionalProperties: false
      required: [code, field, message, requiredInputs]
      properties:
        code:
          type: string
        field:
          type: string
        message:
          type: string
        requiredInputs:
          type: array
          items:
            type: string
        suggestedKitProfiles:
          type: array
          description: >-
            Diagnostic suggestions may name a recognized but unavailable profile. They never prove that the active authority can resolve it.
          items:
            type: string
    ArchitectureV2KitProfile:
      type: string
      enum: [basement-kit, cloud-kit]
    ArchitectureV2ExecutionReadiness:
      type: object
      additionalProperties: false
      required: [contractVersion, generation, apply]
      properties:
        contractVersion:
          type: string
          const: 1.0.0
        generation:
          $ref: "#/components/schemas/ArchitectureV2ExecutionPhaseReadiness"
        apply:
          $ref: "#/components/schemas/ArchitectureV2ExecutionPhaseReadiness"
      if:
        properties:
          generation:
            properties:
              status:
                const: blocked
            required: [status]
        required: [generation]
      then:
        properties:
          apply:
            properties:
              status:
                const: blocked
    ArchitectureV2ExecutionPhaseReadiness:
      type: object
      additionalProperties: false
      required: [status, blockers]
      properties:
        status:
          type: string
          enum: [ready, blocked]
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2ExecutionReadinessBlocker"
      oneOf:
        - properties:
            status:
              const: ready
            blockers:
              maxItems: 0
        - properties:
            status:
              const: blocked
            blockers:
              minItems: 1
    ArchitectureV2ExecutionReadinessBlocker:
      type: object
      additionalProperties: false
      required: [code, refs]
      properties:
        code:
          type: string
          enum:
            - module-umbrella
            - module-contract-only
            - module-render-units-missing
            - provider-realization-none
            - provider-owner-umbrella
            - provider-owner-contract-only
            - provider-owner-apply-support-missing
            - renderer-incompatible
            - input-contract-incomplete
            - required-input-missing
            - required-artifact-missing
            - artifact-output-mismatch
            - module-apply-support-missing
            - required-evidence-missing
            - bridge-overlay-unverified
            - bridge-control-agent-unverified
            - policy-enforcement-unverified
            - device-verifier-unbound
            - bridge-renderer-missing
            - origin-identity-unbound
            - tls-profile-unbound
            - health-gate-not-executable
        refs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            pattern: '^(module|unit|provider|renderer|input|artifact|evidence|bridge|publication|identity|tls|health):\S+$'
    ArchitectureV2ContractID:
      type: string
      pattern: "^[a-z][a-z0-9-]*$"
    ArchitectureV2UnixSocketPath:
      type: string
      description: >-
        Canonical absolute Unix-domain socket path using portable ASCII path segments and a .sock suffix. Empty, dot, dot-dot, repeated, backslash, whitespace, control-character, and trailing-slash segments are forbidden. The 107-character bound is also the exact UTF-8 byte bound because the pattern is ASCII-only, leaving Linux sockaddr_un space for the NUL byte.
      maxLength: 107
      pattern: '^/[A-Za-z0-9._-]+(/[A-Za-z0-9._-]+)*\.sock$'
      not:
        pattern: '(^|/)\.\.?(/|$)'
    ArchitectureV2ContentHash:
      type: string
      pattern: "^sha256:[a-f0-9]{64}$"
    ArchitectureV2SecretRefs:
      type: object
      additionalProperties:
        type: string
        pattern: "^(secret|vault|doppler|techstack)://[^\\s]+$"
    StackKitSummary:
      type: object
      properties:
        name:
          type: string
          example: basement-kit
        displayName:
          type: string
          example: Basement Kit
        description:
          type: string
        version:
          type: string
          example: "1.0.0"
        tags:
          type: array
          items:
            type: string
    StackKit:
      type: object
      properties:
        metadata:
          $ref: "#/components/schemas/StackKitMetadata"
        supportedOS:
          type: array
          items:
            type: string
        requirements:
          $ref: "#/components/schemas/Requirements"
        modes:
          $ref: "#/components/schemas/Modes"
        features:
          $ref: "#/components/schemas/Features"
    StackKitMetadata:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        name:
          type: string
        version:
          type: string
        displayName:
          type: string
        description:
          type: string
        author:
          type: string
        license:
          type: string
        homepage:
          type: string
        repository:
          type: string
        tags:
          type: array
          items:
            type: string
    Requirements:
      type: object
      properties:
        minimum:
          $ref: "#/components/schemas/ResourceSpec"
        recommended:
          $ref: "#/components/schemas/ResourceSpec"
    ResourceSpec:
      type: object
      properties:
        cpu:
          type: integer
        ram:
          type: integer
          description: RAM in GB
        disk:
          type: integer
          description: Disk in GB
    Modes:
      type: object
      properties:
        simple:
          $ref: "#/components/schemas/ModeSpec"
        advanced:
          $ref: "#/components/schemas/ModeSpec"
    ModeSpec:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        engine:
          type: string
          enum: [opentofu, terramate]
        default:
          type: boolean
    Features:
      type: object
      properties:
        multiNode:
          type: boolean
        vpnOverlay:
          type: boolean
        publicAccess:
          type: boolean
    StackSpec:
      type: object
      required: [stackkit]
      properties:
        name:
          type: string
        stackkit:
          type: string
          example: basement-kit
        mode:
          type: string
          enum: [simple, advanced]
        context:
          type: string
          enum: [local, cloud, pi]
        domain:
          type: string
        subdomainPrefix:
          type: string
        email:
          type: string
          format: email
        adminEmail:
          type: string
          format: email
        owner:
          $ref: "#/components/schemas/OwnerConfig"
        tls:
          $ref: "#/components/schemas/TLSSpec"
        paas:
          type: string
          enum: [dokploy, coolify]
        network:
          $ref: "#/components/schemas/NetworkSpec"
        compute:
          $ref: "#/components/schemas/ComputeSpec"
        ssh:
          $ref: "#/components/schemas/SSHSpec"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeSpec"
        services:
          type: object
        environment:
          type: object
          additionalProperties:
            type: string
    OwnerConfig:
      type: object
      description: |
        Lane-aware Owner bootstrap contract. `auto` is for TechStack/kombify
        Cloud handoff and must not require public owner email or username.
        `custom` is explicit self-hosted local Owner bootstrap. `none` skips
        Owner bootstrap. Plaintext recovery passphrases are never accepted.
      properties:
        bootstrapMode:
          type: string
          enum: [auto, custom, none]
        source:
          type: string
          enum: [local, cloud]
        email:
          type: string
          format: email
          description: Required only for bootstrapMode=custom.
        username:
          type: string
          description: Required only for bootstrapMode=custom.
        displayName:
          type: string
        recoveryPassphraseHash:
          type: string
          description: Argon2id PHC hash only; never plaintext.
          pattern: "^\\$argon2id\\$"
        recoveryMaterialRef:
          type: string
          description: TechStack or secret-store reference to generated recovery material.
          pattern: "^(techstack|secret|doppler|vault)://.+|^(env|file):.+"
        cloudOidcIssuer:
          type: string
          format: uri
        cloudOidcClientId:
          type: string
        cloudOidcClientSecretRef:
          type: string
        cloudOidcForeignSubject:
          type: string
    TLSSpec:
      type: object
      properties:
        provider:
          type: string
        challenge:
          type: string
          enum: [tls, dns]
    NetworkSpec:
      type: object
      properties:
        mode:
          type: string
          enum: [local, public, hybrid]
        subnet:
          type: string
        gateway:
          type: string
    ComputeSpec:
      type: object
      properties:
        tier:
          type: string
          enum: [low, standard, high]
    SSHSpec:
      type: object
      properties:
        keyPath:
          type: string
        user:
          type: string
        port:
          type: integer
    NodeSpec:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [main, worker, storage, control-plane, standalone]
        ip:
          type: string
          format: ipv4
        services:
          type: array
          items:
            type: string
    ValidationResult:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
    ValidationError:
      type: object
      properties:
        path:
          type: string
        message:
          type: string
        code:
          type: string
    GenerateRequest:
      type: object
      required: [spec]
      properties:
        spec:
          $ref: "#/components/schemas/StackSpec"
        outputDir:
          type: string
          description: Custom output directory (server-side only)
    GenerateResult:
      type: object
      properties:
        tfvars:
          type: object
          description: Generated terraform variable values
        outputDir:
          type: string
        file:
          type: string
    PreviewResult:
      type: object
      properties:
        tfvars:
          type: object
        preview:
          type: boolean
          const: true
        stackkit:
          $ref: "#/components/schemas/StackKitSummary"
    VerifyRequest:
      type: object
