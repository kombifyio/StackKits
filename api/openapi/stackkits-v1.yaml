    ArchitectureV2DockerHTTPReadonlyProvider:
      type: object
      additionalProperties: false
      required: [id, kind, protocol, version, endpoint, scopes, coLocation, daemonRef, policyProfile]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          const: docker-http-readonly-v1
        protocol:
          type: string
          const: docker-http
        version:
