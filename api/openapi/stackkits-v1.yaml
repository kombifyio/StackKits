        key_path:
          type: string
        key_pem:
          type: string
        private_key:
          type: string
        client_private_key:
          type: string
        proxy_jump:
          type: string
    RuntimeActionResponse:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, ready, applied, verified, skipped, failed]
        action:
          type: string
          enum: [stackkit_rollout, verify_rollout, restore_drill]
        stack_id:
          type: string
        stack_name:
          type: string
        stackkit:
          type: string
        tofu_dir:
          type: string
        unified_path:
          type: string
        mode:
          type: string
