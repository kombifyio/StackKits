    ArchitectureV2ModuleServiceEndpoint:
      type: object
      additionalProperties: false
      required:
        - serviceRef
        - upstreamProtocol
        - targetPort
        - requiredPrivilege
        - allowedIngressProtocols
        - allowedExposures
        - originSelector
        - healthRef
      properties:
        serviceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        upstreamProtocol:
          type: string
          enum: [tcp, udp, http, https]
        targetPort:
          type: integer
          minimum: 1
          maximum: 65535
        requiredPrivilege:
          type: string
          enum: [user, admin, identity, secrets, vault, recovery]
        allowedIngressProtocols:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [tcp, udp, http, https]
        allowedExposures:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [local, remote-private, public]
        originSelector:
          type: string
          enum: [single-site, control-authority-site, multi-zone, edge-pool]
        originSelection:
          $ref: "#/components/schemas/ArchitectureV2ServiceEndpointOriginSelection"
        healthRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        data:
          $ref: "#/components/schemas/ArchitectureV2ModuleServiceEndpointData"
      allOf:
        - if:
            properties: {originSelector: {enum: [single-site, control-authority-site]}}
            required: [originSelector]
          then:
            not: {required: [originSelection]}
        - if:
            properties: {originSelector: {enum: [multi-zone, edge-pool]}}
            required: [originSelector]
          then:
            required: [originSelection]
        - if:
            properties: {originSelector: {const: multi-zone}}
            required: [originSelector]
          then:
            properties:
              originSelection:
                properties:
                  nodeFailureDomainSpread: {minimum: 2}
                  requiredRoles: {maxItems: 0}
        - if:
            properties: {originSelector: {const: edge-pool}}
            required: [originSelector]
          then:
            properties:
              originSelection:
                properties:
                  requiredRoles:
                    minItems: 1
                    maxItems: 1
                    prefixItems: [{const: edge}]
    ArchitectureV2ServiceEndpointOriginSelection:
      type: object
      additionalProperties: false
      required: [siteKinds, minSites, siteFailureDomainSpread, nodeFailureDomainSpread, requiredRoles]
      properties:
        siteKinds:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, enum: [home, cloud]}
        minSites: {type: integer, minimum: 1}
        siteFailureDomainSpread: {type: integer, minimum: 1}
        nodeFailureDomainSpread: {type: integer, minimum: 1}
        requiredRoles:
          type: array
          uniqueItems: true
          items: {type: string, enum: [controller, worker, storage, edge]}
    ArchitectureV2ModuleServiceEndpointData:
      type: object
      additionalProperties: false
      required: [bindingRef, requiredClasses, locality]
      properties:
        bindingRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        requiredClasses:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [public, internal, personal, sensitive, secret]
        locality:
          type: string
          enum: [primary-site, primary-or-replica]
    ArchitectureV2ResolvedModuleRenderUnitInstance:
      type: object
      additionalProperties: false
      description: >-
        One explicit renderer invocation. Module-scoped instances never carry fabricated locality; node-local daemon instances carry the complete observed daemon identity or no daemon identity at all.
      required: [id, scope, outputs, networkBindings]
      oneOf:
        - properties:
            scope:
              const: module
          not:
            anyOf:
              - required: [siteRef]
              - required: [nodeRef]
              - required: [daemonRef]
              - required: [daemonInstanceRef]
              - required: [daemonEngine]
              - required: [daemonSocketPath]
        - required: [siteRef, nodeRef]
          properties:
            scope:
              const: node-local
          not:
            anyOf:
              - required: [daemonRef]
              - required: [daemonInstanceRef]
              - required: [daemonEngine]
              - required: [daemonSocketPath]
        - required: [siteRef, nodeRef, daemonRef, daemonInstanceRef, daemonEngine, daemonSocketPath]
          properties:
            scope:
              const: node-local
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        scope:
          type: string
          enum: [module, node-local]
        siteRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonInstanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        daemonEngine:
          type: string
          const: docker
        daemonSocketPath:
          $ref: "#/components/schemas/ArchitectureV2UnixSocketPath"
        outputs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedModuleRenderInstanceOutput"
        networkBindings:
          type: array
          uniqueItems: true
          description: >-
            Exact runtime-network memberships for this renderer invocation. The renderer receives only these instance-bound bindings.
          items:
            $ref: "#/components/schemas/ArchitectureV2RuntimeNetworkBinding"
    ArchitectureV2ResolvedModuleRenderInstanceOutput:
      type: object
      additionalProperties: false
      description: >-
        Exact instance-owned materialization of one immutable logical render output. path is relative to generation.outputRoot.
      required: [ref, artifactRef, path]
      properties:
        ref:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
        artifactRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        path:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
    ArchitectureV2RenderUnitPlacement:
      type: object
      additionalProperties: false
      required: [scope, cardinality]
      oneOf:
        - properties:
            scope:
              const: module
            cardinality:
              const: single
          not:
            required: [daemonRef]
        - properties:
            scope:
              const: node-local
            cardinality:
              const: single
          not:
            required: [daemonRef]
        - properties:
            scope:
              const: node-local
            cardinality:
              const: one-per-node
          not:
            required: [daemonRef]
        - required: [daemonRef]
          properties:
            scope:
              const: node-local
            cardinality:
              const: one-per-daemon
      properties:
        scope:
          type: string
          enum: [module, node-local]
        cardinality:
          type: string
          enum: [single, one-per-node, one-per-daemon]
        daemonRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
