        originSelection: {$ref: "#/components/schemas/ArchitectureV2ModulePublicRouteOriginSelectionV4"}
        backendPoolRef: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        backendPool: {$ref: "#/components/schemas/ArchitectureV2ModulePublicRouteBackendPool"}
        exposure: {type: string, enum: [local, remote-private, public]}
        protocol: {type: string, enum: [http, https, tcp, udp]}
        upstreamProtocol: {type: string, enum: [http, https, tcp]}
        port: {type: integer, minimum: 1, maximum: 65535}
        targetPort: {type: integer, minimum: 1, maximum: 65535}
        host: {type: string, minLength: 1}
        path: {type: string, pattern: ^/}
        access: {$ref: "#/components/schemas/ArchitectureV2ModulePublicRouteAccess"}
        tls:
          type: object
          additionalProperties: false
          required: [required, mode]
          properties:
            required: {type: boolean}
            mode: {type: string, enum: [off, internal, terminate-at-edge, external]}
            minVersion: {type: string, enum: [TLS1.2, TLS1.3]}
            profileRef: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
            issuerRef: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
            ownerCapabilityRef: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        healthGateRef: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        healthProbe: {$ref: "#/components/schemas/ArchitectureV2ModulePublicRouteHealthProbeV3"}
        capabilityAuthorities:
          type: array
          uniqueItems: true
          items:
            type: object
            additionalProperties: false
            required: [capabilityRef, role]
            properties:
              capabilityRef: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
              role: {type: string, enum: [access, transport, edge, egress]}
      allOf:
        - if:
            properties: {originSelector: {enum: [single-site, control-authority-site]}}
            required: [originSelector]
          then:
            required: [originSiteRef]
            properties:
              originSiteRefs: {maxItems: 1}
            not: {required: [originSelection]}
        - if:
            properties: {originSelector: {enum: [multi-zone, edge-pool]}}
            required: [originSelector]
          then:
            required: [originSelection]
            not: {required: [originSiteRef]}
        - if:
            properties: {originSelector: {const: multi-zone}}
            required: [originSelector]
          then:
            properties:
              originSelection:
                properties:
                  nodeFailureDomainSpread: {minimum: 2}
                  requiredRoles: {maxItems: 0}
        - if:
            properties: {originSelector: {const: edge-pool}}
            required: [originSelector]
          then:
            properties:
              originSelection:
                properties:
                  requiredRoles:
                    minItems: 1
                    maxItems: 1
                    prefixItems: [{const: edge}]
    ArchitectureV2ModulePublicRouteHealthProbeV3:
      oneOf:
        - type: object
          additionalProperties: false
          required: [kind, protocol, port, timeoutSeconds, method, followRedirects, path, expectedStatuses]
          properties:
            kind: {type: string, const: http}
            protocol: {type: string, enum: [http, https]}
            port: {type: integer, minimum: 1, maximum: 65535}
            timeoutSeconds: {type: integer, minimum: 1, maximum: 300}
            method: {type: string, const: GET}
            followRedirects: {type: boolean, const: false}
            path: {type: string, pattern: ^/}
            expectedStatuses:
              type: array
