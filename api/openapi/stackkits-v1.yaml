          minItems: 1
          uniqueItems: true
          items: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        cloudSiteRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        targetNodes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: object
            additionalProperties: false
            required: [siteRef, nodeRef]
            properties:
              siteRef: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
              nodeRef: {$ref: "#/components/schemas/ArchitectureV2ContractID"}
        bridgeContractHash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        requirementsHash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        stackkitsVersion: {type: string, pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'}
        candidateDigest: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        specHash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
        issuedAt: {$ref: "#/components/schemas/ArchitectureV2UTCTimestamp"}
        validUntil:
          description: Must be after issuedAt and no more than 24 hours later.
          $ref: "#/components/schemas/ArchitectureV2UTCTimestamp"
        bindingHash: {$ref: "#/components/schemas/ArchitectureV2ContentHash"}
    ArchitectureV2HostConformanceFacts:
      type: object
      description: >-
        OS compatibility facts plus provider-neutral host diagnostics. Only the OS tuple is a StackKits compatibility claim.
      additionalProperties: false
      required: [os, architecture, kernel, runtime, virtualization]
      properties:
        os:
          type: object
          additionalProperties: false
          required: [family, distribution, version]
          properties:
            family:
              type: string
              const: linux
            distribution:
              $ref: "#/components/schemas/ArchitectureV2ContractID"
            version:
              type: string
              pattern: '^\S+$'
        architecture:
          type: string
          enum: [amd64, arm64]
        kernel:
          type: object
          additionalProperties: false
          required: [release]
          properties:
            release:
              type: string
              pattern: '^\S+$'
        runtime:
          type: object
          additionalProperties: false
          required: [engine, version]
          properties:
            engine:
              type: string
              enum: [docker, podman, containerd, none]
            version:
              type: string
              pattern: '^\S+$'
        virtualization:
          type: object
          additionalProperties: false
          required: [class, nested]
          properties:
            class:
              $ref: "#/components/schemas/ArchitectureV2RuntimeVirtualization"
            nested:
              type: boolean
    ArchitectureV2HostConformanceCheck:
      type: object
      additionalProperties: false
      required: [id, category, status, summary]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        category:
          type: string
          enum: [os-compatibility, host-diagnostic]
        status:
          type: string
          enum: [pass, warning, fail, unverified]
        summary:
          type: string
          minLength: 1
    ArchitectureV2HostConformanceReceipt:
      type: object
      description: >-
        StackKits-owned, hash-bound evidence for one ExternalHostBinding. It records OS support and host diagnostics, never provider compatibility or infrastructure lifecycle state.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - receiptRef
        - bindingRef
        - bindingHash
        - stackId
        - nodeRef
        - stackkitsVersion
        - candidateDigest
        - observedAt
        - validUntil
        - facts
        - checks
        - result
        - receiptDigest
      properties:
        apiVersion:
          type: string
          const: stackkit.host-conformance-receipt/v1
        kind:
          type: string
          const: HostConformanceReceipt
        receiptRef:
          type: string
          pattern: '^host-conformance://sha256/[a-f0-9]{64}$'
        bindingRef:
          type: string
          pattern: '^host-binding://sha256/[a-f0-9]{64}$'
        bindingHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        stackId:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        stackkitsVersion:
          type: string
          pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
        candidateDigest:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        observedAt:
          $ref: "#/components/schemas/ArchitectureV2UTCTimestamp"
        validUntil:
          $ref: "#/components/schemas/ArchitectureV2UTCTimestamp"
        facts:
          $ref: "#/components/schemas/ArchitectureV2HostConformanceFacts"
        checks:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ArchitectureV2HostConformanceCheck"
        result:
          type: string
          enum: [conformant, degraded, incompatible, unverified]
        receiptDigest:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
    ArchitectureV2RuntimeDaemonFact:
      type: object
      additionalProperties: false
      required: [instanceRef, engine, socketPath]
      properties:
        instanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        engine:
          type: string
          const: docker
        socketPath:
          $ref: "#/components/schemas/ArchitectureV2UnixSocketPath"
    ArchitectureV2ResolvedPlan:
      type: object
      description: Raw canonical ResolvedPlan response; never a SuccessEnvelope.
      additionalProperties: false
      required:
        - apiVersion
        - kind
        - stackId
        - kit
        - compilerVersion
        - sourceIntentHash
        - specHash
        - inventoryHash
        - planHash
        - authority
        - install
        - compatibility
        - generation
        - source
        - sites
        - nodes
        - externalHostBindings
        - hostConformanceReceipts
        - homeAccessRequirements
        - externalHomeAccessBindings
        - backupTargetRequirements
        - externalBackupTargetBindings
        - homeBackupTargetRequirements
        - externalHomeBackupTargetBindings
        - federationLinkRequirements
        - externalFederationLinkBindings
        - controlPlane
        - capabilities
        - providers
        - modules
        - runtimeNetworks
        - privilegedInterfaceApprovals
        - placement
        - availability
        - identity
        - identityTrust
        - data
        - failurePolicy
        - system
        - storage
        - network
        - homeLANDiscovery
        - gates
        - executionReadiness
        - evidence
      properties:
        apiVersion:
          type: string
          const: stackkit.resolved-plan/v1
        kind:
          type: string
          const: ResolvedPlan
        stackId:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        fleetRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kit:
          type: object
          additionalProperties: false
          required: [slug, version, definitionHash]
          properties:
            slug:
              $ref: "#/components/schemas/ArchitectureV2KitProfile"
            version:
              type: string
            definitionHash:
              $ref: "#/components/schemas/ArchitectureV2ContentHash"
        compilerVersion:
          type: string
        sourceIntentHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        specHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        inventoryHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        planHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        authority:
          $ref: "#/components/schemas/ArchitectureV2ResolvedPlanAuthority"
        install:
          type: object
        compatibility:
          type: object
        generation:
          $ref: "#/components/schemas/ArchitectureV2ResolvedGenerationPlan"
        source:
          type: object
        sites:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ArchitectureV2SiteSpec"
        nodes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ArchitectureV2NodeSpec"
        externalHostBindings:
          type: object
          description: >-
            Provider-neutral host handoffs keyed by nodeRef. The map may be empty during fast shadow planning.
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2ExternalHostBinding"
        hostConformanceReceipts:
          type: object
          description: >-
            OS compatibility and host diagnostics keyed by nodeRef. Absence is honest pending evidence, not an implicit pass or release gate.
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2HostConformanceReceipt"
        homeAccessRequirements:
          type: object
          description: >-
            Exact provider-neutral access requirements keyed by Home Site and selected access capability. Empty when no such capability exists.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2HomeAccessRequirement"
        externalHomeAccessBindings:
          type: object
          description: >-
            Validated external bindings for the exact Home access requirements. Missing entries remain an explicit apply-readiness blocker.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2ExternalHomeAccessBinding"
        backupTargetRequirements:
          type: object
          description: Exact compiler-owned Cloud backup target requirements.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2BackupTargetRequirement"
        externalBackupTargetBindings:
          type: object
          description: Validated external bindings; missing entries block Apply only.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2ExternalBackupTargetBinding"
        homeBackupTargetRequirements:
          type: object
          description: Exact compiler-owned encrypted Home backup target requirements.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2HomeBackupTargetRequirement"
        externalHomeBackupTargetBindings:
          type: object
          description: Validated external Home backup bindings; missing entries block Apply only.
          additionalProperties:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/ArchitectureV2ExternalHomeBackupTargetBinding"
        federationLinkRequirements:
          type: object
          description: Exact compiler-owned provider-free Federation link requirements.
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2FederationLinkRequirement"
        externalFederationLinkBindings:
          type: object
          description: Validated external link bindings; missing entries block Apply only.
          additionalProperties:
            $ref: "#/components/schemas/ArchitectureV2ExternalFederationLinkBinding"
        controlPlane:
          type: object
        capabilities:
          type: array
          minItems: 1
          items:
            type: object
        providers:
          type: array
          minItems: 1
          items:
            type: object
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedModule"
        runtimeNetworks:
          type: array
          uniqueItems: true
          description: >-
            Explicit provider-owned runtime network instances. An empty array is required when no implementation interface needs a network.
          items:
            $ref: "#/components/schemas/ArchitectureV2RuntimeNetwork"
        privilegedInterfaceApprovals:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedPrivilegedInterfaceApproval"
        placement:
          type: array
          items:
            type: object
        addons:
          type: object
          additionalProperties:
            type: object
        access:
          type: object
          additionalProperties:
            type: object
        bridge:
          type: object
        availability:
          type: object
        identity:
          type: object
        identityTrust:
          $ref: "#/components/schemas/ArchitectureV2ResolvedIdentityTrust"
        data:
          type: object
        failurePolicy:
          type: object
        system:
          type: object
        storage:
          type: object
        network:
          type: object
        homeLANDiscovery:
          $ref: "#/components/schemas/ArchitectureV2HomeLANDiscovery"
        gates:
          type: object
        executionReadiness:
          $ref: "#/components/schemas/ArchitectureV2ExecutionReadiness"
        evidence:
          type: array
          minItems: 1
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    ArchitectureV2ResolvedPlanAuthority:
      type: object
      additionalProperties: false
      description: >-
        Exact semantic CUE authority carried by the plan. Product, contract-fixture, and development authorities are disjoint; only product plans are eligible to contribute graduation evidence. The product fingerprint binds the selected Definition and catalog closure, not the build-local distribution bundle.
      required: [class, document, graduationEligible, issuer, catalogHash]
      properties:
        class:
          type: string
          enum: [product, contract-fixture, development]
        document:
          type: string
          enum: [catalog, contractFixtureCatalog]
        graduationEligible:
          type: boolean
        issuer:
          type: string
          pattern: '^\S+$'
        authorityFingerprint:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        catalogHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
      oneOf:
        - required: [authorityFingerprint]
          properties:
            class:
              const: product
            document:
              const: catalog
            graduationEligible:
              const: true
            issuer:
              const: stackkits-product-authority/v1
        - not:
            required: [authorityFingerprint]
          properties:
            class:
              const: contract-fixture
            document:
              const: contractFixtureCatalog
            graduationEligible:
              const: false
            issuer:
              const: stackkits-contract-fixture-authority/v1
        - not:
            required: [authorityFingerprint]
          properties:
            class:
              const: development
            document:
              const: catalog
            graduationEligible:
              const: false
            issuer:
              const: stackkits-development-authority/v1
    ArchitectureV2ResolvedGenerationPlan:
      type: object
      additionalProperties: false
      description: >-
        Versioned, CUE-owned generation plan. Every artifact is bound to either the plan itself or one exact render-instance output.
      required:
        - contractVersion
        - strategy
        - target
        - outputRoot
        - profileContractHash
        - renderer
        - artifacts
        - rawSpecFallback
      properties:
        contractVersion:
          type: string
          pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$'
        strategy:
          type: string
          enum: [kit-template, module-fragments]
        target:
          type: string
          enum: [opentofu, compose, native]
        outputRoot:
          type: string
          pattern: '^(?:\.|[A-Za-z0-9.][A-Za-z0-9._-]*(?:/[A-Za-z0-9._-]+)*)$'
        profileContractHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        renderer:
          $ref: "#/components/schemas/ArchitectureV2ResolvedRendererIdentity"
        artifacts:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2GeneratedArtifact"
        rawSpecFallback:
          type: boolean
          const: false
    ArchitectureV2ResolvedRendererIdentity:
      type: object
      additionalProperties: false
      required: [id, version]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        version:
          type: string
          minLength: 1
    ArchitectureV2GeneratedArtifact:
      type: object
      additionalProperties: false
      required: [id, kind, path, format, mode, required, owner]
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          enum: [opentofu, compose, metadata, script, native-config]
        path:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._-]*(/[A-Za-z0-9._-]+)*$'
        format:
          type: string
          enum: [json, yaml, hcl, shell, text]
        mode:
          type: string
          pattern: '^0[0-7]{3}$'
        required:
          type: boolean
          const: true
        owner:
          $ref: "#/components/schemas/ArchitectureV2GeneratedArtifactOwner"
    ArchitectureV2GeneratedArtifactOwner:
      type: object
      additionalProperties: false
      required: [kind]
      oneOf:
        - properties:
            kind:
              const: plan
          not:
            anyOf:
              - required: [moduleRef]
              - required: [unitRef]
              - required: [instanceRef]
              - required: [outputRef]
        - required: [moduleRef, unitRef, instanceRef, outputRef]
          properties:
            kind:
              const: render-instance
      properties:
        kind:
          type: string
          enum: [plan, render-instance]
        moduleRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        unitRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        instanceRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        outputRef:
          type: string
          pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
    ArchitectureV2ResolvedModule:
      type: object
      additionalProperties: false
      allOf:
        - if:
            required: [provides]
            properties:
              provides:
                maxItems: 0
          then:
            properties:
              realizationSupport:
                type: object
                required: [scope, level]
                properties:
                  scope:
                    const: concrete
                  level:
                    enum: [generation-ready, apply-ready]
              renderUnits:
                minItems: 1
                contains:
                  type: object
                  required: [providesInterfaces]
                  properties:
                    providesInterfaces:
                      type: array
                      minItems: 1
      required:
        - id
        - version
        - contractHash
        - providerRef
        - provides
        - siteRefs
        - nodeRefs
        - runtime
        - renderUnits
        - realizationSupport
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        version:
          type: string
          pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$'
        contractHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        providerRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        provides:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        siteRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        requires:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        runtime:
          type: object
        nodeSelection:
          $ref: "#/components/schemas/ArchitectureV2ModuleNodeSelection"
        runtimeRequirements:
          $ref: "#/components/schemas/ArchitectureV2ModuleRuntimeRequirements"
        renderUnits:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedModuleRenderUnit"
        realizationSupport:
          $ref: "#/components/schemas/ArchitectureV2ModuleRealizationSupport"
        healthGateRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        evidenceGateRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
    ArchitectureV2ModuleNodeSelection:
      type: object
      additionalProperties: false
      required: [authority, controlPlaneMembers]
      properties:
        authority:
          type: string
          enum: [any, control-authority-site, non-control-authority-sites]
        controlPlaneMembers:
          type: string
          enum: [any, only, exclude]
        requiredRoles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [controller, worker, storage, edge]
        matchLabels:
          type: object
          minProperties: 1
          additionalProperties:
            type: string
    ArchitectureV2ModuleRuntimeRequirements:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        allowedArchitectures:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [amd64, arm64]
        minCpuCores:
          type: integer
          minimum: 1
        minRamGB:
          type: integer
          minimum: 1
        minStorageGB:
          type: integer
          minimum: 1
        allowedVirtualization:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [bare-metal, kvm, openvz, lxc, vmware, hyperv, xen, oracle, microsoft, none]
        requireInventoryFacts:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [arch, cpuCores, ramGB, storageGB, virtualization]
    ArchitectureV2ResolvedModuleRenderUnit:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - rendererRef
        - templateRef
        - version
        - contractHash
        - publicInputRefs
        - secretInputRefs
        - planInputRefs
        - inputBindings
        - values
        - secretRefs
        - planInputs
        - outputs
        - siteRefs
        - nodeRefs
        - placement
        - daemonBindings
        - serviceEndpoints
        - instances
        - providesInterfaces
        - requiresInterfaces
      properties:
        id:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        kind:
          type: string
          enum: [compose, cue-fragment, host, job, opentofu, native-config]
        rendererRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        templateRef:
          type: string
          pattern: '^\S+$'
        version:
          type: string
          pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$'
        contractHash:
          $ref: "#/components/schemas/ArchitectureV2ContentHash"
        publicInputRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        secretInputRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        planInputRefs:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ModulePlanInputRef"
        inputBindings:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ModuleRenderInputBinding"
        values:
          type: object
        secretRefs:
          $ref: "#/components/schemas/ArchitectureV2SecretRefs"
        planInputs:
          $ref: "#/components/schemas/ArchitectureV2ModulePlanInputs"
        outputs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            pattern: '^[A-Za-z0-9.][A-Za-z0-9._/-]*$'
        siteRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        nodeRefs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ContractID"
        placement:
          $ref: "#/components/schemas/ArchitectureV2RenderUnitPlacement"
        daemonBindings:
          type: array
          uniqueItems: true
          description: >-
            Exact observed daemon identity for every node selected by a one-per-daemon render unit; empty for every other cardinality.
          items:
            $ref: "#/components/schemas/ArchitectureV2RuntimeDaemonBinding"
        serviceEndpoints:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2ModuleServiceEndpoint"
        instances:
          type: array
          minItems: 1
          uniqueItems: true
          description: >-
            Exact executable materializations of this immutable logical render unit. The embedded CUE authority binds instance count, deterministic identity, locality, outputs, and placement cardinality.
          items:
            $ref: "#/components/schemas/ArchitectureV2ResolvedModuleRenderUnitInstance"
        providesInterfaces:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ArchitectureV2DockerHTTPReadonlyProvider"
        requiresInterfaces:
          type: array
          uniqueItems: true
          items:
            oneOf:
              - $ref: "#/components/schemas/ArchitectureV2ResolvedDockerHTTPReadonlyRequirement"
              - $ref: "#/components/schemas/ArchitectureV2DockerSocketDirectRequirement"
      allOf:
        - if:
            required: [serviceEndpoints]
            properties:
              serviceEndpoints:
                minItems: 1
          then:
            properties:
              placement:
                properties:
                  scope:
                    const: node-local
    ArchitectureV2ModuleRenderInputBinding:
      type: object
      additionalProperties: false
      required: [targetRef, sourceRef, valueType, cardinality, required]
      properties:
        targetRef:
          $ref: "#/components/schemas/ArchitectureV2ContractID"
        sourceRef:
          type: string
          enum: [identity.deviceEnrollment, identityTrust.homeDeviceAuthority, identityTrust.basementVerification, identityTrust.cloudAuthority, identityTrust.modernHomeAuthority, identityTrust.modernCloudVerification, network.routes, network.cloudHostSecurity, host.bootstrapRuntime, storage.hostRoots, storage.backupRoot]
        valueType:
          type: string
          enum: [device-enrollment-public-v1, home-device-authority-v1, basement-identity-verification-v1, cloud-identity-authority-v1, modern-home-identity-authority-v1, modern-cloud-identity-verification-v1, authority-bound-service-route-list-v4, cloud-host-security-network-v1, host-bootstrap-runtime-v1, host-storage-roots-v1, local-backup-root-v1]
        cardinality:
          type: string
