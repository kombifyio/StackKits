name: Public Tag Fast Follow-up

on:
  push:
    tags:
      - "v*"

concurrency:
  group: public-tag-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  GO_VERSION: "1.26.5"

jobs:
  artifact-smoke:
    name: Public source/artifact smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout published tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build only the three shipped binaries
        run: go build ./cmd/stackkit ./cmd/stackkit-server ./cmd/stackkit-mcp

      - name: Confirm publisher-created release assets exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${GITHUB_REF_NAME}" --json tagName,assets --jq 'select(.tagName == env.GITHUB_REF_NAME and (.assets | length) > 0)'

  publish-image:
    name: Publish StackKit Server image
    needs: artifact-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout published tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push exact tag
        id: image
        shell: bash
        env:
          IMAGE: ghcr.io/kombifyio/stackkits
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          stable_args=()
          if [[ "$TAG" != *-* ]]; then stable_args+=(--tag "${IMAGE}:latest"); fi
          docker buildx build \
            --push \
            --tag "${IMAGE}:${TAG}" \
            "${stable_args[@]}" \
            .
          digest="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{.Manifest.Digest}}')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest published image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/kombifyio/stackkits
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
