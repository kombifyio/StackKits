name: Public Tag Fast Follow-up

on:
  push:
    tags:
      - "v*"

concurrency:
  group: public-tag-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  GO_VERSION: "1.26.5"

jobs:
  artifact-smoke:
    name: Public source/artifact smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout published tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build only the three shipped binaries
        run: go build ./cmd/stackkit ./cmd/stackkit-server ./cmd/stackkit-mcp

      - name: Confirm publisher-created release assets exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${GITHUB_REF_NAME}" --json tagName,assets --jq 'select(.tagName == env.GITHUB_REF_NAME and (.assets | length) > 0)'

  publish-image:
    name: Publish StackKit Server image
    needs: artifact-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout published tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push exact tag
        id: image
        shell: bash
        env:
          IMAGE: ghcr.io/kombifyio/stackkits
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          stable_args=()
          if [[ "$TAG" != *-* ]]; then stable_args+=(--tag "${IMAGE}:latest"); fi
          docker buildx build \
            --push \
            --tag "${IMAGE}:${TAG}" \
            "${stable_args[@]}" \
            .
          digest="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{.Manifest.Digest}}')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest published image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/kombifyio/stackkits
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
