name: Release Verification

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  GO_VERSION: "1.26.3"

jobs:
  test:
    name: Test before release
    if: github.repository == 'kombifyio/stackKits'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test ./...

  validate-archive:
    name: Validate release archive
    if: github.repository == 'kombifyio/stackKits'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Bake registry snapshot from public CUE tree
        run: |
          set -euo pipefail
          go build -o /tmp/stackkit ./cmd/stackkit
          /tmp/stackkit registry bake-from-cue \
            --modules-dir modules \
            --output internal/registry/data/registry_snapshot.json

      - name: Build dry-run archive
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      - name: Verify archive contents
        run: bash scripts/release/validate-release-archives.sh dist

  publish-image:
    name: Publish StackKit Server Image
    if: github.repository == 'kombifyio/stackKits'
    needs: [test, validate-archive]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Build and push GHCR image
        shell: bash
        env:
          IMAGE: ghcr.io/kombifyio/stackkits
          TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

      - name: Resolve image digest
        id: image-digest
        shell: bash
        env:
          IMAGE: ghcr.io/kombifyio/stackkits
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          digest="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{.Manifest.Digest}}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest server image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/kombifyio/stackkits
          subject-digest: ${{ steps.image-digest.outputs.digest }}
          push-to-registry: true
