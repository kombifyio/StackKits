name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: "1.26.5"
  NODE_VERSION: "24"

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Go tests
        run: go test ./...

      - name: Validate Architecture v2 contract proof
        run: node scripts/release/validate-architecture-contract-fixture.mjs --repo-root .

  cue-validation:
    name: CUE Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install CUE
        run: |
          set -euo pipefail
          CUE_VERSION="$(grep 'cuelang.org/go ' go.mod | awk '{print $2}')"
          go install "cuelang.org/go/cmd/cue@${CUE_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate kit CUE contracts
        run: |
          set -euo pipefail
          cue vet ./base/...
          cue vet ./basement-kit/...
          cue vet ./cloud-kit/...

      - name: Validate public module contracts
        run: |
          set -euo pipefail
          for dir in modules/*/; do
            if [ -f "${dir}module.cue" ]; then
              cue vet -c=false "./${dir}..."
            fi
          done

  release-evidence:
    name: Release Evidence and Installer Guards
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Test release evidence renderer
        run: |
          node --test \
            scripts/release/changelog.test.mjs \
            scripts/release/install-latest-resolution.test.mjs \
            scripts/release/release-evidence.test.mjs \
            scripts/release/verify-release-attestations.test.mjs \
            scripts/release/validate-release-evidence.test.mjs \
            scripts/release/validate-scenario-artifact.test.mjs \
            scripts/release/check-l3-paas-contract.test.mjs \
            scripts/release/check-node24-actions.test.mjs \
            scripts/release/check-timeout-budget.test.mjs \
            scripts/evidence/capture-basekit-browser-evidence.test.mjs \
            scripts/evidence/update-homelab-setup-actions.test.mjs

      - name: Validate default StackKit-owned L3 PaaS intent
        run: node scripts/release/check-l3-paas-contract.mjs --repo-root . --generated basement-kit/templates/simple/main.tf

      - name: Validate Node 24 action pins
        run: node scripts/release/check-node24-actions.mjs --repo-root .
