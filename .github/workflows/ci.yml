name: CI Fast (Affected)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: public-ci-fast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"
  NODE_VERSION: "24"

jobs:
  affected:
    name: Fast affected checks
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Checkout bounded history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build affected plan
        id: plan
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base_sha="$PR_BASE_SHA"
          if [ -z "$base_sha" ]; then base_sha="$PUSH_BEFORE_SHA"; fi
          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]] || ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            base_sha="$(git rev-parse HEAD^)"
          fi
          go run ./cmd/stackkit-affected-tests --merge-base "$base_sha" --max-reverse 6 --format json > affected-plan.json
          jq -r '.commands[].argv | @sh' affected-plan.json > affected-plan.sh
          cat affected-plan.json
          echo "need_cue=$(jq -r 'any(.commands[]; .kind == "cue")' affected-plan.json)" >> "$GITHUB_OUTPUT"
          echo "need_node=$(jq -r 'any(.commands[]; .kind == "website" or .kind == "release")' affected-plan.json)" >> "$GITHUB_OUTPUT"

      - name: Setup CUE only when affected
        if: steps.plan.outputs.need_cue == 'true'
        uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
        with:
          version: 'latest'

      - name: Setup Node only when affected
        if: steps.plan.outputs.need_node == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate the small public Architecture v2 contract proof
        run: node scripts/release/validate-architecture-contract-fixture.mjs --repo-root .

      - name: Run affected public release-contract tests
        if: steps.plan.outputs.need_node == 'true'
        run: |
          node --test \
            scripts/release/changelog.test.mjs \
            scripts/release/install-latest-resolution.test.mjs \
            scripts/release/release-evidence.test.mjs \
            scripts/release/verify-release-attestations.test.mjs \
            scripts/release/validate-release-evidence.test.mjs \
            scripts/release/validate-scenario-artifact.test.mjs \
            scripts/release/check-l3-paas-contract.test.mjs \
            scripts/release/check-node24-actions.test.mjs \
            scripts/release/check-timeout-budget.test.mjs \
            scripts/evidence/capture-basekit-browser-evidence.test.mjs \
            scripts/evidence/update-homelab-setup-actions.test.mjs

      - name: Execute only planned checks
        run: bash -euxo pipefail affected-plan.sh
