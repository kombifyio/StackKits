name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: "1.26.3"
  NODE_VERSION: "24"

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go tests
        run: go test ./...

  cue-validation:
    name: CUE Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install CUE
        run: |
          set -euo pipefail
          CUE_VERSION="$(grep 'cuelang.org/go ' go.mod | awk '{print $2}')"
          go install "cuelang.org/go/cmd/cue@${CUE_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate kit CUE contracts
        run: |
          set -euo pipefail
          cue vet ./base/...
          cue vet ./base-kit/...
          cue vet ./modern-homelab/...
          cue vet ./ha-kit/...

      - name: Validate public module contracts
        run: |
          set -euo pipefail
          for dir in modules/*/; do
            if [ -f "${dir}module.cue" ]; then
              cue vet -c=false "./${dir}..."
            fi
          done

  release-evidence:
    name: Release Evidence Renderer
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Test release evidence renderer
        run: node --test scripts/release/release-evidence.test.mjs scripts/release/verify-release-attestations.test.mjs scripts/release/check-l3-paas-contract.test.mjs scripts/evidence/capture-basekit-browser-evidence.test.mjs

      - name: Validate default StackKit-owned L3 PaaS intent
        run: node scripts/release/check-l3-paas-contract.mjs --repo-root . --generated base-kit/templates/simple/main.tf

  website:
    name: Website Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Validate source website surface
        run: node scripts/release/check-website.mjs source

      - name: Build static website
        run: |
          set -euo pipefail
          npm --prefix website ci
          npm --prefix website run check
          npm --prefix website run build
          node scripts/release/check-website.mjs build
