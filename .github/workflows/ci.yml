name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: "1.26.3"
  NODE_VERSION: "24"

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go tests
        run: go test ./...

  cue-validation:
    name: CUE Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install CUE
        run: |
          set -euo pipefail
          CUE_VERSION="$(grep 'cuelang.org/go ' go.mod | awk '{print $2}')"
          go install "cuelang.org/go/cmd/cue@${CUE_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate kit CUE contracts
        run: |
          set -euo pipefail
          cue vet ./base/...
          cue vet ./base-kit/...
          cue vet ./modern-homelab/...
          cue vet ./ha-kit/...

      - name: Validate public module contracts
        run: |
          set -euo pipefail
          for dir in modules/*/; do
            if [ -f "${dir}module.cue" ]; then
              cue vet -c=false "./${dir}..."
            fi
          done

  website:
    name: Website Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Validate source website surface
        run: node scripts/release/check-website.mjs source

      - name: Build static website
        run: |
          set -euo pipefail
          npm --prefix website ci
          npm --prefix website run check
          npm --prefix website run build
          node scripts/release/check-website.mjs build
