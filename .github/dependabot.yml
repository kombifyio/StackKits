version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies, go]
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    labels: [dependencies, website]
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
