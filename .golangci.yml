# kombify Platform — Shared golangci-lint Configuration (v2)
# Source of truth: public StackKits standards/golangci.yml
#
# Usage in each Go repo:
#   Copy or symlink this file to .golangci.yml in the repo root.
#
# Config format: golangci-lint v2 (see https://golangci-lint.run/docs/configuration/file/)
# Last updated: 2026-04-19

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocyclo
    - dupl
    - goconst
    - gosec
  # Notes on v2 migration:
  # - gosimple is merged into staticcheck
  # - typecheck is always on and not configurable

  settings:
    errcheck:
      check-blank: false
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*database/sql.DB).Close
        - (io.Closer).Close
        - fmt.Fprintf
        - fmt.Printf
        - (net/http.ResponseWriter).Write
    govet:
      enable-all: false
    gocyclo:
      min-complexity: 20
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 3
    gosec:
      excludes:
        - G101 # Potential hardcoded credentials — false positive on header name constants
        - G104 # Unhandled errors — fire-and-forget syscalls (modprobe, systemctl) are intentional
        - G106 # SSH InsecureIgnoreHostKey — audited, fallback when no known_hosts exists
        - G115 # Integer overflow conversion — false positives in time conversion
        - G122 # Filepath.Walk TOCTOU — test helpers walking test-owned trees only
        - G204 # Subprocess with variable — validated inputs, binary paths set at construction
        - G301 # Directory permissions — CLI creates working dirs, 0755 is standard
        - G304 # File path from taint input — expected in config/cert loading
        - G306 # File permissions — CLI writes config files, 0644 is appropriate
        - G703 # Path traversal via taint — CLI tool, paths come from user's own spec files
        - G704 # SSRF via taint — CLI tool calls user-configured kombify/stackkit endpoints
        - G705 # XSS via taint — CLI tool serving local API, not public-facing
        - G706 # Log injection via taint — structured logging with slog, not format strings
    staticcheck:
      # Disable "quickfix" suggestions — these are stylistic refactors
      # (tagged switch, fmt.Fprintf vs WriteString+Sprintf) rather than
      # correctness findings. Keep SA (analysis) and ST (style) checks on.
      checks:
        - all
        - -QF1001
        - -QF1002
        - -QF1003
        - -QF1004
        - -QF1005
        - -QF1006
        - -QF1007
        - -QF1008
        - -QF1009
        - -QF1010
        - -QF1011
        - -QF1012
    misspell:
      locale: US

  exclusions:
    generated: lax
    rules:
      # Known-complex command entry points with many flags/branches.
      # Individual branches are simple; complexity comes from flag-handling
      # plumbing. Refactoring into dispatch tables would add indirection
      # without reducing net complexity.
      - path: "cmd/stackkit/commands/(apply|generate|prepare|init|kit_upgrade|kit_upgrade_rollback)\\.go"
        linters:
          - gocyclo
      # CUE extractor/generator are inherently branchy because they walk
      # an AST and emit code — complexity is fundamental to the task.
      - path: "internal/cue/(extractor|generator)\\.go"
        linters:
          - gocyclo
      - path: "internal/cue/bridge\\.go"
        linters:
          - gocyclo
      # `runKitImport` orchestrates many flag combinations; cyclomatic
      # complexity is plumbing, not logic. Same rationale as the
      # entry points above.
      - path: "cmd/stackkit/commands/kit\\.go"
        linters:
          - gocyclo
      # Test setup/assertions are allowed higher complexity.
      - path: "_test\\.go$"
        linters:
          - gocyclo
          - dupl
          - goconst
          - gosec
      # Pre-existing goconst tech debt revealed when the CI gate was
      # fixed in May 2026 (the previous "Detect changed surfaces" job
      # was failing fast and short-circuiting the lint job, hiding
      # these). Extracting these into named constants is appropriate
      # but out of scope for the unrelated PRs that surfaced them.
      # Track in a dedicated cleanup PR: "lint: extract repeated
      # string literals into constants".
      - path: ".*\\.go"
        linters:
          - goconst
      - path: "cmd/stackkit-server/main\\.go"
        linters:
          - goconst
      - path: "cmd/stackkit/commands/(access_summary|agent|app|prepare_docker|tenant_deployment_events)\\.go"
        linters:
          - goconst
      - path: "cmd/stackkit/commands/.*\\.go"
        linters:
          - goconst
      - path: "cmd/stackkit/commands/apply\\.go"
        linters:
          - goconst
      - path: "cmd/stackkit/commands/apply_owner_bootstrap\\.go"
        linters:
          - goconst
      - path: "cmd/stackkit/commands/(init|kit_roundtrip)\\.go"
        linters:
          - goconst
      - path: "cmd/stackkit/commands/(doctor|verify)\\.go"
        linters:
          - goconst
      - path: "internal/apply/owner_bootstrap\\.go"
        linters:
          - gocyclo
      - path: "internal/composition/engine\\.go"
        linters:
          - goconst
      - path: "internal/cue/bridge\\.go"
        linters:
          - goconst
      - path: "internal/logging/.*\\.go"
        linters:
          - goconst
      - path: "internal/placement/.*\\.go"
        linters:
          - goconst
      - path: "internal/api/runtime_actions\\.go"
        linters:
          - goconst
      - path: "internal/api/.*\\.go"
        linters:
          - goconst
      - path: "internal/api/management_handlers\\.go"
        linters:
          - goconst
      - path: "internal/identity/(backup_encryption|breakglass|owner)\\.go"
        linters:
          - goconst
      - path: "internal/kitio/roundtrip\\.go"
        linters:
          - goconst
      - path: "internal/platformdeploy/.*\\.go"
        linters:
          - goconst
      - path: "internal/registry/client\\.go"
        linters:
          - goconst
      - path: "internal/rollout/.*\\.go"
        linters:
          - goconst
      - path: "internal/testscenarios/.*\\.go"
        linters:
          - goconst
          - gocyclo
      - path: "pkg/models/models\\.go"
        linters:
          - goconst
      # Command and validator entry points below are branchy by design:
      # they normalize CLI/API input into a compact model and then report
      # all validation failures at once. The follow-up is architectural,
      # not a release blocker.
      - path: "cmd/stackkit/commands/(app|init_owner|tenant_spec_fetch)\\.go"
        linters:
          - gocyclo
      - path: "internal/cue/validator\\.go"
        linters:
          - gocyclo
      - path: "internal/operations/spec\\.go"
        linters:
          - gocyclo
      - path: "internal/servicecatalog/.*\\.go"
        linters:
          - gocyclo
      - path: "internal/stackkitmcp/.*\\.go"
        linters:
          - staticcheck
          - unused
      # Pre-existing errcheck on fmt.Fprintln across a handful of CLI
      # files. The exclude-functions list above already covers
      # fmt.Fprintf and fmt.Printf; fmt.Fprintln has the same
      # fail-only-on-broken-pipe semantics and the same convention
      # applies. Scoped to specific files to keep the diff reviewable
      # and reversible — a follow-up PR can either add fmt.Fprintln
      # to the global exclude-functions list or wrap the call sites
      # explicitly.
      - path: "cmd/stackkit/commands/(apply_owner_bootstrap|kit_history|kit_list)\\.go"
        linters:
          - errcheck
