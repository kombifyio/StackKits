# GoReleaser configuration for StackKits CLI
# See: https://goreleaser.com/customization/

version: 2
project_name: stackkits

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - sh scripts/release/fetch-opentofu.sh
    - sh scripts/release/fetch-terramate.sh

builds:
  - id: stackkit
    main: ./cmd/stackkit
    binary: stackkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
      - -X main.GitCommit={{ .Commit }}
      - -X main.BuildDate={{ .Date }}

  - id: stackkit-server
    main: ./cmd/stackkit-server
    binary: stackkit-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
      - -X main.GitCommit={{ .Commit }}
      - -X main.BuildDate={{ .Date }}

  - id: stackkit-mcp
    main: ./cmd/stackkit-mcp
    binary: stackkit-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  # Default public bundle — CLI + BaseKit catalog.
  - id: default
    ids:
      - stackkit
      - stackkit-server
      - stackkit-mcp
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - src: ".dist-tools/opentofu/{{ .Os }}_{{ .Arch }}/tofu*"
        dst: .
        strip_parent: true
        info:
          mode: 0755
      - src: ".dist-tools/terramate/{{ .Os }}_{{ .Arch }}/terramate*"
        dst: .
        strip_parent: true
        info:
          mode: 0755
      - README.md
      - LICENSE
      - docs/CLI.md
      - docs/ENTERPRISE_READINESS.md
      - schemas/release-evidence.schema.json
      - cue.mod/**
      - base-kit/**
      - base/**
      - modules/**

  # Per-kit archives — CLI + specific kit + base schemas
  - id: base-kit
    ids:
      - stackkit
      - stackkit-server
      - stackkit-mcp
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}-base-kit_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - src: ".dist-tools/opentofu/{{ .Os }}_{{ .Arch }}/tofu*"
        dst: .
        strip_parent: true
        info:
          mode: 0755
      - src: ".dist-tools/terramate/{{ .Os }}_{{ .Arch }}/terramate*"
        dst: .
        strip_parent: true
        info:
          mode: 0755
      - README.md
      - LICENSE
      - docs/CLI.md
      - docs/ENTERPRISE_READINESS.md
      - schemas/release-evidence.schema.json
      - cue.mod/**
      - base-kit/**
      - base/**
      - modules/**

nfpms:
  - id: deb
    package_name: kombify-stackkits
    vendor: kombify
    homepage: https://github.com/kombifyio/stackKits
    maintainer: kombify <admin@kombify.io>
    description: "kombify StackKits CLI — infrastructure deployment from declarative blueprints"
    license: "Apache-2.0 AND GPL-3.0"
    formats:
      - deb
    bindir: /usr/local/bin
    section: utils
    priority: optional
    contents:
      - src: ".dist-tools/opentofu/linux_{{ .Arch }}/tofu"
        dst: /usr/local/bin/tofu
        file_info:
          mode: 0755
      - src: ".dist-tools/terramate/linux_{{ .Arch }}/terramate"
        dst: /usr/local/bin/terramate
        file_info:
          mode: 0755

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?!:.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?:.+$'
      order: 1
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))?:.+$'
      order: 2
    - title: "Other"
      order: 999

release:
  github:
    owner: kombifyio
    name: stackKits
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## StackKits CLI v{{ .Version }}

    ### Quick Install

    **Base Kit (single-server homelab):**
    ```bash
    curl -sSL https://base.stackkit.cc | sh
    ```

    **CLI + public kit catalog (pick a kit later):**
    ```bash
    curl -sSL https://install.stackkit.cc | sh
    ```

    ### Downloads

    | Archive | Contents |
    |---------|----------|
    | `stackkits_*` | CLI + BaseKit catalog |
    | `stackkits-base-kit_*` | CLI + base-kit only |
  footer: |
    **Full Changelog**: https://github.com/kombifyio/stackKits/compare/{{ .PreviousTag }}...{{ .Tag }}
