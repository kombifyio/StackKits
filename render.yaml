services:
  # StackKits public landing page (stackkit.cc) — built from kombify-StackKits/website.
  # Mirrors the live Render service (srv-d78f7d6dqaus73ctl350) in project kombify-websites.
  - type: web
    name: stackkit-cc
    runtime: static
    rootDir: website
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    domains:
      - stackkit.cc
      - www.stackkit.cc
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "frame-ancestors 'self' https://kombify.io"
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

      - path: /install
        name: Content-Type
        value: text/x-shellscript; charset=utf-8
      - path: /base
        name: Content-Type
        value: text/x-shellscript; charset=utf-8

      - path: /llms.txt
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /llms-full.txt
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /llms-snippets.txt
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /getting-started/agents.md
        name: Content-Type
        value: text/markdown; charset=utf-8
      - path: /getting-started/installation-processes.md
        name: Content-Type
        value: text/markdown; charset=utf-8
      - path: /getting-started/agents/*
        name: Content-Type
        value: text/markdown; charset=utf-8
      - path: /mcp/stackkit-mcp.md
        name: Content-Type
        value: text/markdown; charset=utf-8
      - path: /openmcp.json
        name: Content-Type
        value: application/json; charset=utf-8
      - path: /api/openapi.v1.yaml
        name: Content-Type
        value: application/yaml; charset=utf-8
      - path: /schemas/*
        name: Content-Type
        value: application/schema+json; charset=utf-8

      - path: /llms.txt
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /llms-full.txt
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /llms-snippets.txt
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /getting-started/agents.md
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /getting-started/installation-processes.md
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /getting-started/agents/*
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /mcp/stackkit-mcp.md
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /openmcp.json
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /api/openapi.v1.yaml
        name: Content-Signal
        value: search=yes, ai-input=yes
      - path: /schemas/*
        name: Content-Signal
        value: search=yes, ai-input=yes
