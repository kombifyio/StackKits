# base-kit Stack Specification
#
# Single-environment homelab with a robust Docker default.
#
# Usage:
#   1. Copy: cp default-spec.yaml stack-spec.yaml
#   2. Adjust: IP, SSH user, domain (optional)
#   3. Deploy: stackkit generate && stackkit apply
#
# Architecture:
#   L1 Foundation  - socket-proxy (Docker API isolation), PocketID + TinyAuth (login gateway)
#   L2 Platform    - Traefik
#   L3 Application - Vaultwarden, Jellyfin
#
# Domain Access Modes:
#   1. Local server (default): omit domain or use home.localhost -> zero-config local HTTPS
#      - network.mode: local
#      - current verified default is Docker-only: Traefik + PocketID + TinyAuth + standard apps
#   2. Public server with custom domain: domain: example.com → Coolify + managed TLS
#      - network.mode: public
#      - recommended for kombify Cloud / VPS with your own domain
#   3. Public server with kombify.me: domain: kombify.me → Dokploy + kombify.me subdomains
#      - network.mode: public
#      - requires KOMBIFY_API_KEY during generate/apply
#
# PocketID/OIDC is mandatory for passkey-capable login. Immich/photos, Smart
# Home, Files, AI, and host hardening stay bounded by their live smoke paths.

name: my-homelab
stackkit: base-kit
mode: simple
context: local
domain: home.localhost
email: admin

network:
  mode: local
  # subnet is optional. Leave it unset so Docker picks a non-overlapping range.
  # subnet: 172.30.0.0/16

compute:
  tier: standard

ssh:
  user: admin
  port: 22
  keyPath: ~/.ssh/id_ed25519

nodes:
  - name: homelab-server
    role: standalone
    ip: 192.168.1.100  # ADJUST: Your server IP

# What to adjust:
#
#   Required:
#     nodes[0].ip      - Your server's IP address
#     ssh.user         - Your SSH username (e.g. "admin", "ubuntu")
#     ssh.keyPath      - Path to your SSH private key
#
#   Optional:
#     context          - local | cloud | pi. Default shown here: local
#     domain           - Access mode (see above). Default: home.localhost (zero config)
#     email            - Admin email / ACME email for Let's Encrypt
#
# Local mode DNS setup:
#   Default *.home.localhost needs no router DNS setup on this device.
#   For LAN-wide names, use stackkit init --local-dns or set domain: home /
#   domain: <name>.home and point router DHCP DNS to this server.
#
# First login / access:
#   1. Open https://id.home.localhost -> PocketID passkey identity.
#   2. Open https://auth.home.localhost -> TinyAuth gateway, preconfigured
#      with PocketID OIDC. Local break-glass username/password are generated;
#      treat generated terraform.tfvars.json as sensitive output.
#   3. Open https://vault.home.localhost -> Vaultwarden.
#   4. Open https://media.home.localhost -> Jellyfin. Infrastructure health is
#      available at /health; app-level first-run user setup is not automated yet.
#
# Public server + custom domain example:
#   domain: mylab.example.com
#   context: cloud
#   network:
#     mode: public
#   email: admin@example.com
#   # Custom domain on cloud defaults to Coolify
#   tls:
#     provider: cloudflare   # For DNS-01 ACME challenge
#     challenge: dns
#   # Set STACKKIT_DNS_TOKEN env var with your Cloudflare API token
#
# Public server + kombify.me example:
#   context: cloud
#   domain: kombify.me
#   # kombify.me on cloud defaults to Dokploy
#
# Secrets:
#   Generated automatically by OpenTofu (random_password).
#   No manual secret setup required.
