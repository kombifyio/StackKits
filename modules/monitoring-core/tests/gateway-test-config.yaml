# OTel gateway test config — points to local VictoriaMetrics in test compose
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_concurrent_streams: ${env:KOMBIFY_OTEL_GATEWAY_MAX_CONCURRENT_STREAMS:-50}
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: ${env:KOMBIFY_OTEL_GATEWAY_MEMORY_LIMIT_MIB:-200}
    spike_limit_mib: ${env:KOMBIFY_OTEL_GATEWAY_MEMORY_SPIKE_LIMIT_MIB:-50}
  batch:
    timeout: ${env:KOMBIFY_OTEL_GATEWAY_BATCH_TIMEOUT:-2s}
    send_batch_size: 500

exporters:
  prometheusremotewrite:
    endpoint: "${env:KOMBIFY_OTEL_GATEWAY_REMOTE_WRITE_ENDPOINT:-http://victoriametrics:8428/api/v1/write}"
    resource_to_telemetry_conversion:
      enabled: true
    tls:
      insecure: true
  file:
    path: /var/lib/otel/output/received-metrics.json

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  extensions: [health_check]
  pipelines:
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [prometheusremotewrite, file]
