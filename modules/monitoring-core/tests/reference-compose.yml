# monitoring-core Reference Compose
# Purpose: Integration test for VictoriaMetrics + OTel gateway
# Usage:
#   docker compose -f modules/monitoring-core/tests/reference-compose.yml up -d
#   curl http://localhost:18428/health          # VictoriaMetrics health
#   curl http://localhost:18428/metrics         # VM self-metrics (Prometheus)
#   curl "http://localhost:18428/api/v1/query?query=up"   # PromQL query

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.139.0
    container_name: test-victoriametrics
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=${KOMBIFY_VM_RETENTION_PERIOD:-7d}
      # Cap internal caches to 40% of container memory limit
      - -memory.allowedPercent=${KOMBIFY_VM_MEMORY_ALLOWED_PERCENT:-40}
      - -maxConcurrentInserts=${KOMBIFY_VM_MAX_CONCURRENT_REQUESTS:-4}
      - -search.maxConcurrentRequests=${KOMBIFY_VM_MAX_CONCURRENT_REQUESTS:-4}
      - -search.maxQueryDuration=30s
      # Enable OTLP ingestion endpoint (/opentelemetry/api/v1/push)
      - -enableTCP6=false
    ports:
      - "18428:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: 1.0

  otel-gateway:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: test-otel-gateway
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./gateway-test-config.yaml:/etc/otelcol/config.yaml:ro
      - ${KOMBIFY_OTLP_ARTIFACTS_DIR:-./artifacts}:/var/lib/otel/output
    environment:
      GOMEMLIMIT: "256MiB"
      KOMBIFY_OTEL_GATEWAY_BATCH_TIMEOUT: "5s"
      KOMBIFY_OTEL_GATEWAY_MAX_CONCURRENT_STREAMS: "50"
      KOMBIFY_OTEL_GATEWAY_MEMORY_LIMIT_MIB: "200"
      KOMBIFY_OTEL_GATEWAY_MEMORY_SPIKE_LIMIT_MIB: "50"
      KOMBIFY_OTEL_GATEWAY_REMOTE_WRITE_ENDPOINT: "http://victoriametrics:8428/api/v1/write"
    ports:
      - "14317:4317"   # OTLP/gRPC inbound from agents
      - "14318:4318"   # OTLP/HTTP inbound
      - "18888:8888"   # Gateway self-metrics
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    depends_on:
      victoriametrics:
        condition: service_started

  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: test-otel-agent
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./agent-test-config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - test-net
    depends_on:
      otel-gateway:
        condition: service_started

networks:
  test-net:
    driver: bridge

volumes:
  victoriametrics-data:
