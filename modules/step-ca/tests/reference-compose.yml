# Step-CA Module Reference Compose
# Purpose: Validate Step-CA internal PKI + ACME provisioner
#
# Architecture:
#   step-ca (ACME CA) — internal certificate authority
#   traefik — uses step-ca ACME resolver for TLS certs
#   whoami — test service to verify TLS cert issuance
#
# Usage:
#   docker compose -f modules/step-ca/tests/reference-compose.yml up -d --wait
#   ./modules/step-ca/tests/integration_test.sh

services:
  step-ca:
    # Pin to a known-good release. :latest has caused exit 126 in CI; this
    # pin keeps the test deterministic and matches the version recommended
    # by upstream documentation as of writing.
    image: smallstep/step-ca:0.27.4
    container_name: test-step-ca
    # Run as the image's default step user (uid 1000). The volume gets
    # initialised by the entrypoint on first boot; we don't need to chown
    # anything ourselves.
    user: "1000:1000"
    environment:
      DOCKER_STEPCA_INIT_NAME: "Test Homelab CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,ca.test.local,localhost"
      DOCKER_STEPCA_INIT_PASSWORD: "test-ca-password"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "Admin JWK"
      DOCKER_STEPCA_INIT_ACME: "true"
      DOCKER_STEPCA_INIT_ADDRESS: "0.0.0.0:9000"
    volumes:
      - step-ca-data:/home/step
    healthcheck:
      # The image ships with curl. Use --insecure because the CA uses its
      # own self-signed cert during health checks.
      test: ["CMD-SHELL", "curl -fsk https://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # smallstep/step-ca's /usr/local/bin/step-ca binary has file capabilities
    # (cap_net_bind_service=+eip) set so it can bind low ports when asked. With
    # cap_drop: ALL + no-new-privileges, the kernel denies exec with EPERM
    # (exit 126) because the process can't acquire its file-cap requirements.
    # We run on :9000 so we don't *need* the capability at runtime, but we must
    # grant it so exec succeeds. This keeps every other capability dropped.
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 512m
    cpus: 0.5

  traefik:
    image: traefik:v3.3
    container_name: test-traefik-stepca
    command:
      - "--api.insecure=true"
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    depends_on:
      step-ca:
        condition: service_healthy
    ports:
      - "8898:80"
      - "19098:8080"
      - "8499:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  whoami:
    image: traefik/whoami:latest
    container_name: test-stepca-whoami
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.test.local`)"
      - "traefik.http.routers.whoami.entrypoints=web"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
    networks:
      - test-net

networks:
  test-net:
    driver: bridge

volumes:
  step-ca-data:
