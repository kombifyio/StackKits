# Dozzle Reference Compose
# Purpose: Isolated testing of Dozzle log viewer with Traefik
# Usage:
#   docker compose -f modules/dozzle/tests/reference-compose.yml up -d
#   Add to /etc/hosts: 127.0.0.1 logs.test.local
#   Browser: http://logs.test.local:8894 (Dozzle log viewer)

services:
  traefik:
    image: traefik:v3.3
    container_name: test-traefik-dozzle
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "8894:80"
      - "19094:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - test-net

  dozzle:
    image: amir20/dozzle:latest
    container_name: test-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`logs.test.local`)"
      - "traefik.http.routers.dozzle.entrypoints=web"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 0.25

networks:
  test-net:
    driver: bridge
