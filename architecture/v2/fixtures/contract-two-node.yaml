apiVersion: stackkit/v2alpha1
kind: StackSpec
metadata:
  name: contract-two-node
source:
  kind: native-v2
kit:
  slug: basement-kit
install:
  mode: bootstrapped
  runtime: docker
  platform:
    management: selected-provider
    fallbackAllowed: false
    setupPolicy: {}
generation:
  strategy: module-fragments
  target: compose
  outputRoot: deploy
system:
  timezone: UTC
  locale: en_US.UTF-8
  swap: auto
  unattendedUpgrades: security
storage:
  dataRoot: /opt/data
  backupRoot: /opt/backups
  stacksRoot: /opt/stacks
  volumeDriver: local
container:
  engine: docker
  rootless: true
  liveRestore: true
  dataRoot: /home/stackkit/.local/share/docker
  logDriver: json-file
  registryMirrors: []
network:
  mode: private
  domain:
    base: contract.home.arpa
  transport:
    subnet: 172.28.0.0/16
    mtu: 1500
    ipv6: false
  dns:
    servers: [1.1.1.1, 8.8.8.8]
    searchDomains: []
  tls:
    defaultMode: off
    minVersion: TLS1.2
sites:
  - id: home
    kind: home
    failureDomain: fixture-house
nodes:
  - id: fixture-a
    siteRef: home
    roles: [controller, worker]
    hardware:
      arch: amd64
      profile: standard
    failureDomain: fixture-host-a
    enabled: true
  - id: fixture-b
    siteRef: home
    roles: [worker]
    hardware:
      arch: amd64
      profile: standard
    failureDomain: fixture-host-b
    enabled: true
controlPlane:
  mode: single
  authoritySiteRef: home
  members: [fixture-a]
capabilities:
  enable: []
  disable: []
availability:
  enabled: false
  mode: single
  fencing: none
deviceEnrollment:
  mode: local-only
  authoritySiteRef: home
  endpointExposure: lan
  remoteEnrollment: false
  requireOwnerStepUp: true
  requireLocalPairingProof: true
  requireDeviceGeneratedKey: true
  requirePossessionProof: true
  hardwareBackedKey: preferred
  revocationSupported: true
  credentialTTLSeconds: 3600
access:
  fixture-dashboard-local:
    exposure: lan
    privilege: user
    authentication: device
    enrolledDeviceRequired: true
    ownerStepUpRequired: false
    lanStepDown: true
routes:
  fixture-dashboard:
    moduleRef: fixture-http-consumer
    serviceRef: fixture-dashboard
    exposure: local
    protocol: http
    port: 8080
    host: dashboard.contract.home.arpa
    path: /
    accessPolicyRef: fixture-dashboard-local
partitionPolicy:
  onCloudLoss: not-applicable
  onLinkLoss: local-continues
  cloudEdge: not-applicable
  localIdentityAuthorityAvailable: true
  maxStaleVerificationSeconds: 0
  denyNewCrossSiteSessions: true
data:
  defaultAuthority: home
